      <input class="grow2" aria-label="Worker name" value="${esc(w.name)}" onchange="renameWorker(${i},this.value)">
      <select class="grow1" aria-label="Farm" onchange="assignWorkerFarm(${i},this.value)">${set.farms.map(f=>`<option ${w.farm===f.name?'selected':''}>${esc(f.name)}</option>`).join('')}</select>
      <button class="mini-toggle ${w.earnsCommission?'on':''}" title="Earns commission" onclick="toggleWorkerFlag(${i},'earnsCommission')">${icon('wallet')}</button>
      <button class="mini-toggle ${w.active?'on green':''}" onclick="toggleWorkerActive(${i})">${w.active?'Active':'Off'}</button>
      <button class="row-del" aria-label="Delete ${esc(w.name)}" onclick="deleteWorker(${i})">${icon('trash')}</button>
      ${bal>0?`<div class="row-sub">owes ${fmt(bal)}</div>`:''}
    </div>`;
  }).join('')||'<div class="foot-note">No workers match.</div>';
  html+=`<button class="btn btn-ghost add-btn" onclick="addWorker()">${icon('plus')} Add worker</button>
    <div class="foot-note tight">${icon('wallet','fn-ic')} = earns commission (a farm's commission splits among its commission workers). Deactivate to keep history; delete only works with no records.</div></div>`;

  // Customers
  html+=`<div class="eyebrow">Wholesalers & customers</div><div class="card pad">`;
  const cq=(uiSearch.customers||'').toLowerCase(); const cfreq=customerFrequency();
  if(set.customers.length>10) html+=`<input type="search" placeholder="Search…" value="${esc(uiSearch.customers||'')}" oninput="uiSearch.customers=this.value;renderSettings();focusSearch('customer')" style="margin-bottom:12px">`;
  const clist=set.customers.slice().sort((a,b)=>(cfreq[b.name]||0)-(cfreq[a.name]||0)).filter(c=>!cq||c.name.toLowerCase().includes(cq));
  html+=clist.map(c=>{ const i=set.customers.indexOf(c); const s=customerStats(c.name);
    return `<div class="set-row wrap" style="opacity:${c.active?1:.5}">
      <input class="grow2" aria-label="Customer name" value="${esc(c.name)}" onchange="renameCustomer(${i},this.value)">
      <span class="row-stat num">${s.n?s.n+' · '+fmtC(s.rm):'—'}</span>
      <button class="mini-toggle ${c.active?'on green':''}" onclick="toggleCustomerActive(${i})">${c.active?'Active':'Off'}</button>
      <button class="row-del" aria-label="Delete ${esc(c.name)}" onclick="deleteCustomer(${i})">${icon('trash')}</button>
    </div>`;
  }).join('')||'<div class="foot-note">No customers match.</div>';
  html+=`<button class="btn btn-ghost add-btn" onclick="addCustomer()">${icon('plus')} Add customer</button>
    <div class="foot-note tight">Inactive customers stay in reports but leave the Add screen. Renaming updates all past sales.</div></div>`;

  // Produce
  html+=`<div class="eyebrow">Produce</div><div class="card pad"><div class="chips">`+
    set.produce.map((p,i)=>`<span class="chip">${esc(p)} <button class="x" aria-label="Remove ${esc(p)}" onclick="rmList('produce',${i})">×</button></span>`).join('')+
    `<button class="chip add" onclick="addList('produce','New produce name')">${icon('plus','chip-plus')} add</button></div></div>`;

  // Expense categories
  html+=`<div class="eyebrow">Expense categories</div><div class="card pad"><div class="chips">`+
    set.expenseCats.map((p,i)=>`<span class="chip">${esc(p)} <button class="x" aria-label="Remove ${esc(p)}" onclick="rmList('expenseCats',${i})">×</button></span>`).join('')+
    `<button class="chip add" onclick="addList('expenseCats','New category name')">${icon('plus','chip-plus')} add</button></div></div>`;

  // Commission rates
  html+=`<div class="eyebrow">Commission rates · RM per kg</div><div class="card pad"><table class="rates-table num">
    <thead><tr><th>Produce</th><th>Grade A</th><th>Grade B</th></tr></thead><tbody>`+
    set.produce.map(p=>{ const r=set.rates[p]||{A:0,B:0};
      return `<tr><td class="rt-name">${esc(p)}</td>
        <td><input type="number" inputmode="decimal" step="any" aria-label="${esc(p)} A" value="${r.A||0}" onchange="setRate(${attr(p)},'A',this.value)"></td>
        <td><input type="number" inputmode="decimal" step="any" aria-label="${esc(p)} B" value="${r.B||0}" onchange="setRate(${attr(p)},'B',this.value)"></td></tr>`;
    }).join('')+`</tbody></table><div class="foot-note tight">Changing a rate recalculates all commission, past and future.</div></div>`;

  // Salary periods
  html+=`<div class="eyebrow">Salary periods</div><div class="card pad">`+
    set.salaryPeriods.map((p,i)=>`<div class="set-row wrap salary-row">
      <select class="grow1" aria-label="Worker" onchange="updateSalary(${i},'worker',this.value)">${allWorkers().map(w=>`<option ${p.worker===w.name?'selected':''}>${esc(w.name)}${w.active?'':' (off)'}</option>`).join('')}</select>
      <input type="month" class="grow1" aria-label="Start" value="${esc(p.start)}" onchange="updateSalary(${i},'start',this.value)">
      <input type="month" class="grow1" aria-label="End (blank = ongoing)" value="${esc(p.end||'')}" onchange="updateSalary(${i},'end',this.value)">
      <input type="number" inputmode="decimal" class="salary-amt" aria-label="RM/month" value="${p.salary}" onchange="updateSalary(${i},'salary',this.value)">
      <button class="row-del" aria-label="Remove period" onclick="rmSalary(${i})">${icon('trash')}</button>
    </div>`).join('')+
    `<button class="btn btn-ghost add-btn" onclick="addSalary()">${icon('plus')} Add salary period</button>
    <div class="foot-note tight">Worker · start · end (blank = ongoing) · RM/month. When salary changes, close the old period and add a new one.</div></div>`;

  // Danger
  html+=`<div class="eyebrow">Danger zone</div><div class="card pad">
    <button class="btn btn-block danger-btn" onclick="eraseAll()">${icon('trash')} Erase all entries</button>
    <div class="foot-note tight">Deletes every entry (settings kept). Export a backup first.</div></div>`;
  html+=`<div class="version-tag">Field Ledger · ${S.entries.length} entries</div>`;

  document.getElementById('view').innerHTML=html;
  document.getElementById('topSub').textContent='Settings';
}
function focusSearch(kind){ const els=document.querySelectorAll('#view input[type=search]'); els.forEach(x=>{ if((kind==='worker'&&x.placeholder.includes('worker'))||(kind==='customer'&&!x.placeholder.includes('worker'))){ x.focus(); const v=x.value; x.value=''; x.value=v; } }); }

/* ---------- settings CRUD (preserved from v4) ---------- */
function renameFarm(i,name){ name=name.trim(); if(!name){ renderSettings(); return; }
  const old=S.settings.farms[i].name; if(old===name) return;
  for(const e of S.entries){ if(e.farm===old) e.farm=name; }
  for(const w of S.settings.workers){ if(w.farm===old) w.farm=name; }
  S.settings.farms[i].name=name; if(S.settings.lastFarm===old) S.settings.lastFarm=name;
  save(); toast('Farm renamed — entries updated', true); renderSettings();
}
function customerStats(name){ let n=0,rm=0; for(const e of S.entries){ if(e.type==='Sale'&&e.customer===name){ n++; rm+=e.amount; } } return {n,rm}; }
function addWorker(){ const v=prompt('Worker name'); if(!v||!v.trim()) return; const name=v.trim();
  if(S.settings.workers.some(w=>w.name.toLowerCase()===name.toLowerCase())){ toast('That worker already exists'); return; }
  S.settings.workers.push({id:uid(),name,farm:S.settings.farms[0].name,earnsCommission:true,active:true});
  save(); toast('Worker added — set farm and salary', true); renderSettings();
}
function renameWorker(i,name){ name=(name||'').trim(); const w=S.settings.workers[i];
  if(!name||name===w.name){ renderSettings(); return; }
  if(S.settings.workers.some((x,xi)=>xi!==i&&x.name.toLowerCase()===name.toLowerCase())){ toast('That name is already used'); renderSettings(); return; }
  const old=w.name; for(const e of S.entries){ if(e.worker===old) e.worker=name; }
  for(const pp of S.settings.salaryPeriods){ if(pp.worker===old) pp.worker=name; }
  w.name=name; save(); toast('Renamed — records updated', true); renderSettings();
}
function assignWorkerFarm(i,farm){ S.settings.workers[i].farm=farm; save(); toast('Farm assigned'); renderSettings(); }
function toggleWorkerFlag(i,flag){ S.settings.workers[i][flag]=!S.settings.workers[i][flag]; save(); renderSettings(); }
function toggleWorkerActive(i){ const w=S.settings.workers[i];
  if(w.active){ const bal=round2(outstanding(w.name));
    let msg='Deactivate '+w.name+'? History is kept.'; if(bal>0) msg+='\n\nStill owes '+fmt(bal)+' in advances.';
    if(!confirm(msg)) return;
    const ym=todayStr().slice(0,7); const open=S.settings.salaryPeriods.filter(pp=>pp.worker===w.name&&!pp.end);
    if(open.length && confirm('Also end '+w.name+"'s ongoing salary period at "+monthLabel(ym)+'?')){ for(const pp of open) pp.end=ym; }
    w.active=false;
  } else w.active=true;
  save(); renderSettings();
}
function deleteWorker(i){ const w=S.settings.workers[i];
  const used=S.entries.some(e=>e.worker===w.name)||S.settings.salaryPeriods.some(pp=>pp.worker===w.name);
  if(used){ toast(w.name+' has records — deactivate instead'); return; }
  if(!confirm('Delete '+w.name+'? No records exist.')) return;
  S.settings.workers.splice(i,1); save(); renderSettings();
}
function addCustomer(){ const v=prompt('Customer / wholesaler name'); if(!v||!v.trim()) return; const name=v.trim();
  const ex=S.settings.customers.find(c=>c.name.toLowerCase()===name.toLowerCase());
  if(ex){ ex.active=true; toast('Already existed — set active'); } else S.settings.customers.push({id:uid(),name,active:true});
  save(); renderSettings();
}
function renameCustomer(i,name){ name=(name||'').trim(); const c=S.settings.customers[i];
  if(!name||name===c.name){ renderSettings(); return; }
  if(S.settings.customers.some((x,xi)=>xi!==i&&x.name.toLowerCase()===name.toLowerCase())){ toast('Name already used'); renderSettings(); return; }
  const old=c.name; let n=0; for(const e of S.entries){ if(e.type==='Sale'&&e.customer===old){ e.customer=name; n++; } }
  c.name=name; save(); toast('Renamed — '+n+' sales updated', true); renderSettings();
}
function deleteCustomer(i){ const c=S.settings.customers[i];
  if(S.entries.some(e=>e.type==='Sale'&&e.customer===c.name)){ toast(c.name+' has sales — set inactive instead'); return; }
  if(!confirm('Delete '+c.name+'?')) return;
  S.settings.customers.splice(i,1); save(); renderSettings();
}
function toggleCustomerActive(i){ S.settings.customers[i].active=!S.settings.customers[i].active; save(); renderSettings(); }
function addList(key,msg){ const v=prompt(msg); if(!v||!v.trim()) return;
  S.settings[key].push(v.trim());
  if(key==='produce'&&!S.settings.rates[v.trim()]) S.settings.rates[v.trim()]={A:0,B:0};
  save(); renderSettings();
}
function rmList(key,i){ const v=S.settings[key][i]; const used=S.entries.some(e=>e.category===v);
  if(used){ if(!confirm('"'+v+'" is used by existing entries (they keep it). Remove from quick-pick?')) return; }
  S.settings[key].splice(i,1); save(); renderSettings();
}
function setRate(p,g,v){ if(!S.settings.rates[p]) S.settings.rates[p]={A:0,B:0}; S.settings.rates[p][g]=Number(v)||0; save(); toast('Rate saved'); }
function addSalary(){ const w=workersList()[0]; S.settings.salaryPeriods.push({worker:w?w.name:'',start:todayStr().slice(0,7),end:null,salary:0}); save(); renderSettings(); }
function rmSalary(i){ if(!confirm('Remove this salary period?')) return; S.settings.salaryPeriods.splice(i,1); save(); renderSettings(); }
function updateSalary(i,field,value){ const p=S.settings.salaryPeriods[i]; if(!p) return;
  if(field==='salary') p.salary=Number(value)||0; else if(field==='end') p.end=value||null; else p[field]=value;
  save(); if(field!=='salary') renderSettings();
}
function eraseAll(){ if(!confirm('Delete ALL '+S.entries.length+' entries? Settings kept.')) return;
  if(!confirm('Really sure? No undo. Export a backup first.')) return;
  S.entries=[]; save(); toast('All entries erased'); renderSettings();
}

/* ---------- export / backup ---------- */
function downloadFile(name,content,type){ const blob=new Blob([content],{type}); const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=name; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),4000);
}
function markBackedUp(){ S.settings.lastBackup=todayStr(); save(); if(tab==='settings') renderSettings(); }
function exportBackup(){ const payload={app:'field-ledger',version:5,exported:new Date().toISOString(),data:S};
  downloadFile('field-ledger-backup-'+todayStr()+'.json',JSON.stringify(payload),'application/json'); markBackedUp(); toast('Backup saved', true);
}
function restoreBackup(input){ const file=input.files&&input.files[0]; input.value=''; if(!file) return;
  const reader=new FileReader(); reader.onerror=()=>toast('Could not read that file');
  reader.onload=()=>{ let payload; try{ payload=JSON.parse(reader.result); }catch(e){ toast('Not a valid backup'); return; }
    const d=payload&&(payload.app==='field-ledger'||payload.app==='farm-ledger')?payload.data:payload;
    if(!d||!Array.isArray(d.entries)||!d.settings||!Array.isArray(d.settings.farms)){ toast('Not a Field Ledger backup'); return; }
    if(!confirm('Restore backup from '+(payload.exported?payload.exported.slice(0,10):'unknown')+' with '+d.entries.length+' entries?\n\nThis REPLACES all data on this phone.')) return;
    S=migrate(d); save(); toast('Restored — '+d.entries.length+' entries', true); renderSettings();
  }; reader.readAsText(file);
}
function exportCSV(){
  const head=['Date','Source','Type','Category','Customer / Description','Grade','Quantity (kg)','Amount (RM)','Worker','Notes'];
  const rows=S.entries.slice().sort((a,b)=>a.date.localeCompare(b.date)).map(e=>{
    const source=e.type==='Sale'?'Sales - '+e.farm:e.farm+' Expenses';
    const typ=e.type==='Advance'?'Worker Advance':(e.type==='Payout'?'Salary Payout':e.type);
    let notes=e.notes||''; if(e.type==='Sale'&&e.price!=null&&!/@/.test(notes)) notes=(notes?notes+' ':'')+'@'+e.price+'/kg';
    return [e.date,source,typ,e.category,e.customer,e.grade,e.qty!=null?e.qty:'',e.amount,e.worker,notes];
  });
  const csv=[head].concat(rows).map(r=>r.map(v=>{ v=String(v==null?'':v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }).join(',')).join('\r\n');
  downloadFile('field-ledger-'+todayStr()+'.csv','\ufeff'+csv,'text/csv;charset=utf-8'); markBackedUp(); toast('CSV exported', true);
}


/* ============================================================
   NAV + INIT
   ============================================================ */
const NAV=[
  ['home','home','Home'],
  ['entries','list','Ledger'],
  ['__fab__','',''],
  ['workers','people','Workers'],
  ['summary','chart','Summary']
];
function buildNav(){
  const el=document.getElementById('navInner');
  el.innerHTML=NAV.map(([t,ic,lbl])=>{
    if(t==='__fab__') return `<div class="fab-slot"><button class="fab" aria-label="Add entry" onclick="startSale()">${icon('plus')}</button></div>`;
    return `<button data-tab="${t}" onclick="navTap('${t}')">${icon(ic)}<span>${lbl}</span></button>`;
  }).join('');
}
function navTap(t){ editingId=null; switchTab(t); }
function setNavActive(t){
  document.querySelectorAll('#navInner button[data-tab]').forEach(b=>{
    const on=b.dataset.tab===t; b.classList.toggle('on',on);
    if(on) b.setAttribute('aria-current','page'); else b.removeAttribute('aria-current');
  });
}
function switchTab(t){
  tab=t; setNavActive(t); window.scrollTo(0,0);
  if(t==='home') renderHome();
  else if(t==='add') renderAdd();
  else if(t==='entries') renderEntries();
  else if(t==='workers') renderWorkers();
  else if(t==='summary') renderSummary();
  else if(t==='settings') renderSettings();
}
// long-press or tap the topbar title area opens settings
function initSettingsAccess(){
  const bar=document.querySelector('.topbar .sub');
  const title=document.querySelector('.topbar');
  const gear=document.createElement('button');
  gear.className='settings-btn'; gear.setAttribute('aria-label','Settings');
  gear.innerHTML=icon('gear'); gear.onclick=()=>{ editingId=null; switchTab('settings'); };
  title.appendChild(gear);
}

(async function init(){
  buildNav(); initSettingsAccess();
  const saved=await store.load();
  if(saved && saved.entries && saved.settings) S=migrate(saved);
  else S=migrate(defaultState());
  await save();
  switchTab('home');
})();

</script>
