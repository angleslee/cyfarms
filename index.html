let cropForm=null;

function addDays(ds, n){ const [y,m,d]=ds.split('-').map(Number); const dt=new Date(y,m-1,d+n); return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'); }
function dayDiff(a,b){ /* whole days from a to b */ const [y1,m1,d1]=a.split('-').map(Number),[y2,m2,d2]=b.split('-').map(Number); return Math.round((new Date(y2,m2-1,d2)-new Date(y1,m1-1,d1))/86400000); }
function puid(){ return 'p'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function livePlantings(){ return (S.plantings||[]).filter(p=>!p.deleted); }

/* Derived daily status. The schedule anchors on the LAST ACTUAL collection,
   not a fixed calendar — reality drives the plan, never the other way round. */
function cropInfo(p){
  const today=todayStr();
  if(p.status==='ended') return {phase:'done'};
  if(p.status==='growing'){
    const total=Math.max(1, dayDiff(p.planted, p.expectFirst));
    const done=Math.max(0, dayDiff(p.planted, today));
    const dLeft=dayDiff(today, p.expectFirst);
    return {phase:'growing', dLeft, progress:Math.min(1, done/total), ready:dLeft<=0};
  }
  const anchor=p.lastCollected || p.firstHarvest || p.expectFirst;
  const wait=Math.max(0, dayDiff(anchor, today));
  const nextDue=addDays(anchor, p.interval);
  return {phase:'harvesting', anchor, wait, nextDue, due: wait>=p.interval, dueTomorrow: nextDue===addDays(today,1)};
}
function intervalLabel(n){ return n===1?'Picked daily':'Every '+n+' days'; }

/* Yield per planting: every sale of this produce at this farm, dated inside
   the planting's harvest window (first harvest → ended, or today). Backdated
   plantings pick up historical sales automatically. */
function plantingYield(p){
  const from=p.firstHarvest || p.expectFirst;
  const to=p.ended || todayStr();
  const out={kg:0, rm:0, kgA:0, from, to, days:Math.max(1, dayDiff(from,to)+1), shared:false};
  if(!from || to<from) return out;
  for(const e of live()){
    if(e.type!=='Sale' || e.category!==p.produce || !e.qty) continue;
    const share=farmShare(e, p.farm); if(!share) continue;
    if(e.date<from || e.date>to) continue;
    out.kg+=e.qty*share; out.rm+=e.amount*share;
    if(e.grade==='A') out.kgA+=e.qty*share;
  }
  /* if another planting of the same produce at the same farm was harvesting in
     the same window, sales can't be told apart — flag it honestly */
  for(const o of livePlantings()){
    if(o.id===p.id || o.deleted || o.produce!==p.produce || o.farm!==p.farm) continue;
    if(o.status==='growing' && !o.firstHarvest) continue;
    const oFrom=o.firstHarvest||o.expectFirst, oTo=o.ended||todayStr();
    if(oFrom<=to && from<=oTo){ out.shared=true; break; }
  }
  out.kg=round2(out.kg); out.rm=round2(out.rm); out.kgA=round2(out.kgA);
  out.perWeek=round2(out.kg/(out.days/7));
  return out;
}

/* When a sale is recorded, the produce was obviously collected — keep the
   crop schedule in step automatically, zero extra taps. */
function autoCollectFromSale(farm, date, categories){
  let n=0;
  const cats={}; for(const c of categories) cats[c]=1;
  for(const p of livePlantings()){
    if(p.farm!==farm || !cats[p.produce] || p.status==='ended') continue;
    if(p.status==='growing'){
      if(dayDiff(p.planted, date)<7) continue; /* a sale days after planting is a different batch */
      p.status='harvesting'; p.firstHarvest=date; p.lastCollected=date; p.updatedAt=nowMs(); n++;
    } else if(!p.lastCollected || date>p.lastCollected){
      p.lastCollected=date; p.updatedAt=nowMs(); n++;
    }
  }
  return n;
}

function markCollected(id, date){
  const p=livePlantings().find(x=>x.id===id); if(!p) return;
  p.lastCollected=date||todayStr(); p.updatedAt=nowMs();
  save(); toast(p.produce+' marked collected');
  renderTab(tab);
}
function startHarvest(id){
  const p=livePlantings().find(x=>x.id===id); if(!p) return;
  const d=todayStr();
  p.status='harvesting'; p.firstHarvest=d; p.lastCollected=d; p.updatedAt=nowMs();
  save(); toast('Harvesting started · '+p.produce);
  renderTab(tab);
}
function endPlanting(id){
  const p=livePlantings().find(x=>x.id===id); if(!p) return;
  if(!confirm('End this planting? It moves to Past plantings — history stays.')) return;
  p.status='ended'; p.ended=todayStr(); p.updatedAt=nowMs();
  save(); toast('Planting ended'); cropForm=null; renderCrops();
}
function reopenPlanting(id){
  const p=livePlantings().find(x=>x.id===id); if(!p) return;
  p.status = p.firstHarvest ? 'harvesting' : 'growing'; p.ended=null; p.updatedAt=nowMs();
  save(); toast('Planting reopened'); cropForm=null; renderCrops();
}
function deletePlanting(id){
  const p=livePlantings().find(x=>x.id===id); if(!p) return;
  if(!confirm('Delete this planting record completely?')) return;
  p.deleted=true; p.updatedAt=nowMs();
  save(); toast('Planting deleted'); cropForm=null; renderCrops();
}

/* ---- crops tab ---- */
function renderCrops(){
  if(cropForm){ renderCropForm(); return; }
  document.getElementById('hdrTitle').textContent='Crops';
  const farms=S.settings.farms.map(f=>f.name);
  const act=livePlantings().filter(p=>p.status!=='ended');
  const past=livePlantings().filter(p=>p.status==='ended').sort((a,b)=>(b.ended||'').localeCompare(a.ended||''));

  let html=`<div class="actionrow" style="margin-top:4px">
    <button class="bigbtn pri" onclick="openCropForm()">${svg('plus','ic')} New planting</button>
  </div>`;

  if(!act.length && !past.length){
    html+=`<div class="card" style="margin-top:14px"><div class="mini-empty">${svg('sprout','ic')}No plantings yet.<br>Record what's in the ground and Field Ledger will tell you<br><b>which farm to visit, and when</b>.</div></div>`;
  }

  for(const fn of farms){
    const list=act.filter(p=>p.farm===fn).sort((a,b)=>{
      const ia=cropInfo(a), ib=cropInfo(b);
      const ka=ia.phase==='harvesting'?(ia.due?0:2):(ia.ready?1:3);
      const kb=ib.phase==='harvesting'?(ib.due?0:2):(ib.ready?1:3);
      return ka-kb || a.produce.localeCompare(b.produce);
    });
    if(!list.length) continue;
    html+=`<h2 class="sec">${esc(fn)}</h2>`;
    for(const p of list) html+=cropCard(p);
  }

  if(past.length){
    html+=`<h2 class="sec">Past plantings <span class="side">${past.length}</span></h2><div class="card rowlist">`;
    for(const p of past){
      const y=plantingYield(p);
      const span = p.firstHarvest ? `${shortDate(p.firstHarvest)} – ${shortDate(p.ended||p.firstHarvest)}` : 'never harvested';
      html+=`<button class="erow" onclick="openCropForm('${p.id}')">
        <div class="ei" style="background:var(--line2); color:var(--faint)">${svg('sprout')}</div>
        <div class="em"><div class="t1">${esc(p.produce)}</div><div class="t2">${esc(p.farm)} · ${span}${p.notes?' · '+esc(p.notes):''}</div></div>
        <div class="ea"><div class="a1 num" style="color:var(--ink)">${y.kg?y.kg.toLocaleString('en-MY')+' kg':'—'}</div><div class="a2 num">${y.rm?fmtc(y.rm):''}</div></div></button>`;
    }
    html+=`</div>`;
  }
  document.getElementById('view').innerHTML=html;
}

function cropCard(p){
  const i=cropInfo(p);
  let badge='', sub='', stat='', btn='', icCls='grow', bar='';
  if(i.phase==='growing'){
    sub=`Planted ${dateLabel(p.planted)}`;
    bar=`<div class="cropbar"><i style="width:${Math.round(i.progress*100)}%"></i></div>`;
    if(i.ready){
      badge=`<span class="badge due">Ready</span>`;
      stat=i.dLeft===0?'Expected first harvest today':`Expected ${Math.abs(i.dLeft)} day${Math.abs(i.dLeft)>1?'s':''} ago`;
      btn=`<button class="collectbtn" onclick="startHarvest('${p.id}')">${svg('basket')} Start harvest</button>`;
    }else{
      badge=`<span class="badge grow">Growing</span>`;
      stat=`First harvest in <b>${i.dLeft} day${i.dLeft>1?'s':''}</b> · ${shortDate(p.expectFirst)}`;
    }
  } else {
    icCls='harv';
    sub=`${intervalLabel(p.interval)} · last collected ${p.lastCollected?dateLabel(p.lastCollected):'—'}`;
    if(i.due){
      badge=`<span class="badge due">Due</span>`;
      stat = p.interval===1 && i.wait>1
        ? `<span class="wait">${i.wait} days picked &amp; waiting</span>`
        : (i.wait>p.interval ? `<span class="wait">${i.wait-p.interval} day${i.wait-p.interval>1?'s':''} overdue</span>` : 'Due today');
      btn=`<button class="collectbtn" onclick="markCollected('${p.id}')">${svg('check')} Collected</button>`;
    }else{
      badge=`<span class="badge harv">Harvesting</span>`;
      stat=i.nextDue===addDays(todayStr(),1)?'Next: tomorrow':`Next: ${dowLabel(i.nextDue)} ${shortDate(i.nextDue)}`;
      btn=`<button class="collectbtn ghost" onclick="markCollected('${p.id}')">${svg('check')} Collected</button>`;
    }
  }
  return `<div class="cropcard">
    <button class="ctop" style="width:100%; text-align:left" onclick="openCropForm('${p.id}')">
      <div class="cic ${icCls}">${svg(i.phase==='growing'?'sprout':'basket')}</div>
      <div class="cmain">
        <div class="cname">${esc(p.produce)} ${badge}</div>
        <div class="csub">${sub}</div>
      </div>
      ${svg('chevR')}
    </button>
    ${bar}
    <div class="cfoot"><div class="cstat">${stat}</div>${btn}</div>
  </div>`;
}

/* ---- planting editor ---- */
function openCropForm(id){
  if(id){
    const p=livePlantings().find(x=>x.id===id); if(!p) return;
    cropForm={ id, farm:p.farm, produce:p.produce, planted:p.planted,
      maturity:String(Math.max(1,dayDiff(p.planted,p.expectFirst))), interval:String(p.interval),
      notes:p.notes||'', status:p.status, firstHarvest:p.firstHarvest||'', lastCollected:p.lastCollected||'' };
  }else{
    const d=S.settings.cropDefaults||{};
    const prod=S.settings.produce[0];
    const def=d[prod]||{maturity:60, interval:3};
    cropForm={ id:null, farm:pickFarm(), produce:prod, planted:todayStr(),
      maturity:String(def.maturity), interval:String(def.interval), notes:'', status:'growing' };
  }
  switchTab('crops');
}
function cfSetFarm(f){ cropForm.farm=f; renderCropForm(); }
function cfSetProduce(pr){
  cropForm.produce=pr;
  const def=(S.settings.cropDefaults||{})[pr];
  if(def && !cropForm.id){ cropForm.maturity=String(def.maturity); cropForm.interval=String(def.interval); }
  renderCropForm();
}
function cfAddProduce(){
  const n=prompt('New produce name'); if(!n) return;
  const name=n.trim(); if(!name) return;
  if(!S.settings.produce.includes(name)){
    S.settings.produce.splice(S.settings.produce.length-1, 0, name); /* keep Other Produce last */
    if(!S.settings.ratesHistory[name]) S.settings.ratesHistory[name]=[{from:'0000-01',A:0,B:0}];
    S.settings.rev=(S.settings.rev||0)+1; save();
  }
  cfSetProduce(name);
}
function cfSetInterval(v){ cropForm.interval=String(v); renderCropForm(); }
function cfHint(){
  const el=document.getElementById('fhHint'); if(!el) return;
  const m=Math.max(1, Math.round(Number(cropForm.maturity)||0));
  el.textContent = cropForm.planted ? 'First harvest around '+dateLabel(addDays(cropForm.planted, m)) : '';
}
function renderCropForm(){
  const c=cropForm;
  document.getElementById('hdrTitle').textContent = c.id?'Edit planting':'New planting';
  const set=S.settings;
  const iv=Number(c.interval)||0;
  const preset=[1,2,3,4,7];
  const custom=!preset.includes(iv);
  let html=`<div class="card" style="padding:16px 15px">
    <label class="f">Farm</label>
    <div class="chips">${set.farms.map(f=>`<button class="chip ${c.farm===f.name?'on':''}" onclick="cfSetFarm('${esc(f.name)}')">${esc(f.name)}</button>`).join('')}</div>
    <label class="f">Produce</label>
    <div class="chips">${set.produce.filter(p=>p!=='Other Produce').map(p=>`<button class="chip ${c.produce===p?'on':''}" onclick="cfSetProduce('${esc(p)}')">${esc(p)}</button>`).join('')}
      <button class="chip add" onclick="cfAddProduce()">+ New</button></div>
    <label class="f">Planted on</label>
    <input type="date" value="${c.planted}" oninput="cropForm.planted=this.value; cfHint()">
    <label class="f">Days to first harvest <span class="hint">· from planting</span></label>
    <input type="number" inputmode="numeric" min="1" value="${esc(c.maturity)}" oninput="cropForm.maturity=this.value; cfHint()">
    <div class="note" id="fhHint" style="margin:7px 3px 0"></div>
    <label class="f">Harvest rhythm <span class="hint">· once producing</span></label>
    <div class="chips">
      ${preset.map(n=>`<button class="chip ${iv===n?'on':''}" onclick="cfSetInterval(${n})">${n===1?'Daily':'Every '+n+'d'}</button>`).join('')}
      <button class="chip ${custom?'on':''}" onclick="cfSetInterval(${custom&&iv>0?iv:5})">Custom</button>
    </div>
    ${custom?`<div style="margin-top:9px"><input type="number" inputmode="numeric" min="1" value="${iv>0?iv:''}" placeholder="Days between collections" oninput="cropForm.interval=this.value"></div>`:''}
    <label class="f">Notes <span class="hint">· optional</span></label>
    <input type="text" value="${esc(c.notes)}" placeholder="e.g. back rows, new seed brand" oninput="cropForm.notes=this.value">
  </div>`;

  if(c.id && c.status!=='growing'){
    const pl=livePlantings().find(x=>x.id===c.id);
    if(pl){
      const y=plantingYield(pl);
      const aPct=y.kg?Math.round(y.kgA/y.kg*100):0;
      html+=`<div class="card" style="padding:16px 15px; margin-top:12px">
        <label class="f" style="margin-top:2px">Yield ${c.status==='ended'?'(final)':'so far'} <span class="hint">· from sales ${shortDate(y.from)} → ${shortDate(y.to)}</span></label>
        <div class="wgrid" style="margin-top:8px">
          <div class="wstat"><div class="k">Harvested</div><div class="v num">${y.kg.toLocaleString('en-MY')} kg</div></div>
          <div class="wstat"><div class="k">Revenue</div><div class="v num">${fmt(y.rm)}</div></div>
        </div>
        <div class="note" style="margin:2px 2px 0">Grade A ${aPct}% · avg ${y.perWeek.toLocaleString('en-MY')} kg/week · ${y.days} day${y.days>1?'s':''} harvesting</div>
        ${y.shared?`<div class="note" style="margin:7px 2px 0; color:var(--adv)">Another ${esc(pl.produce)} planting at ${esc(pl.farm)} overlaps this window — figures show the farm total for the period.</div>`:''}
      </div>`;
    }
    html+=`<div class="card" style="padding:16px 15px; margin-top:12px">
      <label class="f" style="margin-top:2px">Harvest log</label>
      <div class="row2">
        <div><div class="note" style="margin:0 0 5px 2px">First harvest</div>
          <input type="date" value="${c.firstHarvest||''}" oninput="cropForm.firstHarvest=this.value"></div>
        <div><div class="note" style="margin:0 0 5px 2px">Last collected</div>
          <input type="date" value="${c.lastCollected||''}" oninput="cropForm.lastCollected=this.value"></div>
      </div>
    </div>`;
  }

  html+=`<div class="actionrow" style="margin-top:14px">
    <button class="bigbtn pri" onclick="saveCropForm()">${svg('check','ic')} ${c.id?'Save changes':'Save planting'}</button>
    <button class="bigbtn sec" onclick="cropForm=null; renderCrops()">Cancel</button>
  </div>`;

  if(c.id){
    html+=`<div class="card rowlist" style="margin-top:16px">`;
    if(c.status==='ended'){
      html+=`<button class="setrow" onclick="reopenPlanting('${c.id}')"><div class="sl"><div class="s1">Reopen planting</div><div class="s2">Bring it back to the active list</div></div><div class="sr">${svg('settle')}</div></button>`;
    }else{
      html+=`<button class="setrow" onclick="endPlanting('${c.id}')"><div class="sl"><div class="s1">End planting</div><div class="s2">Crop finished or pulled out — keeps history</div></div><div class="sr">${svg('flag')}</div></button>`;
    }
    html+=`<button class="setrow" onclick="deletePlanting('${c.id}')"><div class="sl"><div class="s1" style="color:var(--exp)">Delete planting</div><div class="s2">Remove this record completely</div></div><div class="sr" style="color:var(--exp)">${svg('trash')}</div></button></div>`;
  }
  document.getElementById('view').innerHTML=html;
  cfHint();
}
function saveCropForm(){
  const c=cropForm;
  const m=Math.round(Number(c.maturity)||0), iv=Math.round(Number(c.interval)||0);
  if(!c.planted){ toast('Pick the planting date'); return; }
  if(m<1){ toast('Days to first harvest must be at least 1'); return; }
  if(iv<1){ toast('Harvest rhythm must be at least 1 day'); return; }
  const expect=addDays(c.planted, m);
  if(c.id){
    const p=livePlantings().find(x=>x.id===c.id); if(!p) return;
    p.farm=c.farm; p.produce=c.produce; p.planted=c.planted; p.expectFirst=expect;
    p.interval=iv; p.notes=(c.notes||'').trim();
    if(p.status!=='growing'){
      p.firstHarvest=c.firstHarvest||p.firstHarvest;
      p.lastCollected=c.lastCollected||p.lastCollected;
    }
    p.updatedAt=nowMs();
    toast('Planting updated');
  }else{
    S.plantings.push({ id:puid(), farm:c.farm, produce:c.produce, planted:c.planted,
      expectFirst:expect, interval:iv, status:'growing', firstHarvest:null, lastCollected:null,
      ended:null, notes:(c.notes||'').trim(), updatedAt:nowMs(), deleted:false });
    toast(c.produce+' planted · first harvest ~'+shortDate(expect));
  }
  /* remember what was used, so next planting of this produce is prefilled */
  if(!S.settings.cropDefaults) S.settings.cropDefaults={};
  S.settings.cropDefaults[c.produce]={maturity:m, interval:iv};
  S.settings.rev=(S.settings.rev||0)+1;
  save(); cropForm=null; renderCrops();
}

/* ---- Home: today's farm run ---- */
function farmRunHTML(){
  const act=livePlantings().filter(p=>p.status!=='ended');
  if(!act.length) return '';
  const today=todayStr(), tomorrow=addDays(today,1);
  const farms=S.settings.farms.map(f=>f.name);
  let dueTotal=0, groups='', nexts=[];
  for(const fn of farms){
    let rows='';
    for(const p of act.filter(x=>x.farm===fn)){
      const i=cropInfo(p);
      if(i.phase==='growing' && i.ready){
        dueTotal++;
        rows+=`<div class="runrow"><div class="cic grow" style="width:34px;height:34px">${svg('sprout')}</div>
          <div class="rmain"><div class="r1">${esc(p.produce)}</div><div class="r2">Ready for first harvest</div></div>
          <button class="collectbtn" onclick="startHarvest('${p.id}')">${svg('basket')} Start</button></div>`;
      } else if(i.phase==='harvesting' && i.due){
        dueTotal++;
        const why = p.interval===1 && i.wait>1 ? `<span class="wait">${i.wait} days picked &amp; waiting</span>`
          : (i.wait>p.interval ? `<span class="wait">${i.wait-p.interval}d overdue</span> · ${intervalLabel(p.interval).toLowerCase()}`
          : intervalLabel(p.interval));
        rows+=`<div class="runrow"><div class="cic harv" style="width:34px;height:34px">${svg('basket')}</div>
          <div class="rmain"><div class="r1">${esc(p.produce)}</div><div class="r2">${why}</div></div>
          <button class="collectbtn" onclick="markCollected('${p.id}')">${svg('check')} Collected</button></div>`;
      } else if(i.phase==='harvesting' && i.dueTomorrow){
        nexts.push(esc(p.produce)+' · '+esc(fn));
      } else if(i.phase==='growing' && i.dLeft===1){
        nexts.push(esc(p.produce)+' starts · '+esc(fn));
      }
    }
    if(rows) groups+=`<div class="runfarm">${svg('leaf')} ${esc(fn)}</div>${rows}`;
  }
  let html=`<h2 class="sec">Farm run <span class="side">${dueTotal?dueTotal+' to collect':'nothing due'}</span></h2>`;
  if(dueTotal){
    html+=`<div class="runcard">${groups}</div>`;
    if(nexts.length) html+=`<div class="note" style="margin:8px 6px 0">Tomorrow: ${nexts.join(' · ')}</div>`;
  }else{
    html+=`<div class="card"><div class="setrow" style="cursor:default"><div class="sl"><div class="s1">No collections due today</div><div class="s2">${nexts.length?('Tomorrow: '+nexts.join(' · ')):'Schedule is up to date'}</div></div><div class="sr" style="color:var(--field)">${svg('check')}</div></div></div>`;
  }
  return html;
}

const TABS=[
  {id:'home', label:'Home', ic:'home'},
  {id:'crops', label:'Crops', ic:'sprout'},
  {id:'record', label:'Record', ic:'record', center:true},
  {id:'entries', label:'Entries', ic:'entries'},
  {id:'workers', label:'Workers', ic:'workers'},
  {id:'summary', label:'Summary', ic:'chart'}
];
function renderNav(){
  const wrap=document.getElementById('navwrap');
  wrap.innerHTML=TABS.map(t=>`<button data-tab="${t.id}" class="${tab===t.id?'on':''} ${t.center?'record':''}" onclick="navTap('${t.id}')" aria-label="${t.label}">${svg(t.ic,'ic')}${t.label}</button>`).join('');
}
function navTap(id){
  if(id==='record'){ startRecord(basket&&!editingId?basket.mode:'Sale'); return; }
  editingId=null; basket=null; cropForm=null; switchTab(id);
}

/* ============ ROUTING ============ */
function renderTab(t){
  if(t==='home') renderHome();
  else if(t==='crops') renderCrops();
  else if(t==='record') renderRecord();
  else if(t==='entries') renderEntries();
  else if(t==='workers') renderWorkers();
  else if(t==='summary') renderSummary();
  else if(t==='settings') renderSettings();
}
function switchTab(t){
  tab=t; renderNav();
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on', b.dataset.tab===t || (t==='record'&&b.dataset.tab==='record')));
  window.scrollTo(0,0);
  renderTab(t);
}

/* ============ BOOT ============ */
async function boot(){
  let d=local.load();
  if(!d){
    const legacy=local.loadLegacy();
    if(legacy){ d=migrate(legacy); toast('Imported your existing ledger'); }
    else d=defaultState();
  } else {
    d=migrate(d);
  }
  S=d; local.save(S);
  Sync.init(S.settings.sync);
  renderNav(); switchTab('home');
  if(Sync.status!=='off') doSync('pull');
  /* pull again when returning to the app */
  document.addEventListener('visibilitychange',()=>{ if(!document.hidden && Sync.status!=='off') doSync('pull'); });
  window.addEventListener('online',()=>{ if(Sync.status!=='off') doSync('push'); });
}
boot();

</script>
</body>
</html>
