<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Field Ledger">
<meta name="theme-color" content="#F3F1E9">
<title>Field Ledger</title>
<style>
:root{
  --bg:#F3F1E9; --card:#FFFFFF; --ink:#1D2B21; --muted:#6B7A64; --faint:#9AA793;
  --line:#E4E7DC; --line2:#EEF0E8;
  --field:#2C6E49; --field-deep:#1F5236; --field-soft:#E7F0E9;
  --sale:#2C6E49; --sale-soft:#E7F0E9;
  --exp:#B5462A; --exp-soft:#F7E9E3;
  --adv:#C0870B; --adv-soft:#F8F0DC;
  --settle:#3E6295; --settle-soft:#E7EEF7;
  --amber:#C0870B;
  --radius:16px; --radius-sm:11px;
  --shadow:0 1px 2px rgba(29,43,33,.04), 0 1px 3px rgba(29,43,33,.05);
  --shadow-lift:0 4px 16px rgba(29,43,33,.10);
  --sat:env(safe-area-inset-top); --sab:env(safe-area-inset-bottom);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0; padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg); color:var(--ink); font-size:16px; line-height:1.45;
  padding-bottom:calc(78px + var(--sab));
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
}
.num{font-variant-numeric:tabular-nums; font-feature-settings:"tnum"}
button{font:inherit; border:none; cursor:pointer; color:inherit; background:none; margin:0}
input,select,textarea{
  font:inherit; width:100%; padding:13px 14px; border:1.5px solid var(--line); border-radius:var(--radius-sm);
  background:#fff; color:var(--ink); min-height:50px; -webkit-appearance:none; appearance:none;
}
input:focus,select:focus,textarea:focus{outline:none; border-color:var(--field); box-shadow:0 0 0 3px var(--field-soft)}
select{background-image:url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20width%3D%2210%22%20height%3D%226%22%20viewBox%3D%220%200%2010%206%22%20fill%3D%22none%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%3E%3Cpath%20d%3D%22M1%201l4%204%204-4%22%20stroke%3D%22%236B7A64%22%20stroke-width%3D%221.5%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%2F%3E%3C%2Fsvg%3E"); background-repeat:no-repeat; background-position:right 14px center; padding-right:36px}
button:focus-visible, .chip:focus-visible, .slab:focus-visible, a:focus-visible, .tap:focus-visible{outline:2.5px solid var(--field); outline-offset:2px; border-radius:6px}
nav button:focus-visible{outline-offset:-4px}

/* ============ APP CHROME ============ */
header{
  padding:calc(14px + var(--sat)) 20px 12px; display:flex; align-items:center; justify-content:space-between; gap:10px;
  position:sticky; top:0; z-index:20; background:linear-gradient(var(--bg), var(--bg) 72%, rgba(243,241,233,0));
}
header .brand{display:flex; align-items:center; gap:9px; min-width:0}
header .mark{width:26px; height:26px; flex:none}
header h1{font-size:19px; margin:0; letter-spacing:-.4px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
header .r{display:flex; align-items:center; gap:8px; flex:none}
.synctag{display:flex; align-items:center; gap:5px; font-size:11px; font-weight:700; color:var(--muted); padding:5px 9px; border-radius:20px; background:#fff; border:1px solid var(--line)}
.synctag .dot{width:7px; height:7px; border-radius:50%; background:var(--faint)}
.synctag.ok .dot{background:var(--field)}
.synctag.busy .dot{background:var(--amber); animation:pulse 1s infinite}
.synctag.off{display:none}
.gearbtn{width:38px; height:38px; border-radius:11px; background:#fff; border:1px solid var(--line); display:flex; align-items:center; justify-content:center; color:var(--muted); flex:none}
.gearbtn svg{width:20px; height:20px}
.gearbtn:active{background:var(--line2)}
@keyframes pulse{50%{opacity:.35}}

main{padding:2px 16px 0; max-width:600px; margin:0 auto}
h2.sec{font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); font-weight:800; margin:26px 6px 10px; display:flex; align-items:center; justify-content:space-between}
h2.sec .side{text-transform:none; letter-spacing:0; font-weight:700; color:var(--faint); font-size:12px}
.card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow)}
.pad{padding:16px}

/* ============ NAV ============ */
nav{
  position:fixed; bottom:0; left:0; right:0; z-index:30;
  display:flex; gap:2px; padding:7px 10px calc(7px + var(--sab));
  background:rgba(255,255,255,.86); backdrop-filter:saturate(1.6) blur(14px); -webkit-backdrop-filter:saturate(1.6) blur(14px);
  border-top:1px solid var(--line);
}
nav .navwrap{display:flex; gap:2px; max-width:600px; margin:0 auto; width:100%}
nav button{flex:1; text-align:center; font-size:10.5px; font-weight:700; color:var(--muted); padding:6px 0 3px; border-radius:12px; transition:color .15s}
nav button .ic{display:block; margin:0 auto 3px; width:23px; height:23px}
nav button.on{color:var(--field)}
nav button.record{position:relative}

/* ============ CROPS ============ */
.cropcard{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:14px 15px; margin-bottom:10px; position:relative}
.cropcard .ctop{display:flex; align-items:flex-start; gap:11px}
.cropcard .cic{width:38px; height:38px; border-radius:11px; display:flex; align-items:center; justify-content:center; flex:none}
.cropcard .cic svg{width:21px; height:21px}
.cic.grow{background:var(--adv-soft); color:var(--adv)}
.cic.harv{background:var(--field-soft); color:var(--field)}
.cic.done{background:var(--line2); color:var(--faint)}
.cropcard .cmain{flex:1; min-width:0}
.cropcard .cname{font-weight:800; font-size:16px; display:flex; align-items:center; gap:8px; flex-wrap:wrap}
.cropcard .csub{font-size:13px; color:var(--muted); margin-top:2px}
.badge{font-size:10.5px; font-weight:800; padding:3px 8px; border-radius:999px; letter-spacing:.4px; text-transform:uppercase}
.badge.grow{background:var(--adv-soft); color:var(--adv)}
.badge.harv{background:var(--field-soft); color:var(--field)}
.badge.due{background:var(--exp-soft); color:var(--exp)}
.badge.done{background:var(--line2); color:var(--muted)}
.cropbar{height:6px; border-radius:99px; background:var(--line2); margin:11px 0 6px; overflow:hidden}
.cropbar i{display:block; height:100%; border-radius:99px; background:linear-gradient(90deg, var(--amber), var(--field)); transition:width .3s}
.cropcard .cfoot{display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:10px}
.cropcard .cstat{font-size:12.5px; color:var(--muted); font-weight:600}
.collectbtn{display:inline-flex; align-items:center; gap:6px; font-weight:800; font-size:13.5px; color:#fff; background:var(--field); padding:9px 14px; border-radius:11px; transition:transform .06s}
.collectbtn:active{transform:scale(.96)}
.collectbtn.ghost{background:#fff; color:var(--field); border:1.5px solid var(--field)}
.collectbtn svg{width:16px; height:16px}
/* farm run card on Home */
.runcard{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden; margin-bottom:4px}
.runfarm{padding:12px 15px 4px; font-size:12px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; display:flex; align-items:center; gap:7px}
.runfarm svg{width:15px; height:15px; color:var(--field)}
.runrow{display:flex; align-items:center; gap:11px; padding:10px 15px 12px; border-bottom:1px solid var(--line2)}
.runrow:last-child{border-bottom:none}
.runrow .rmain{flex:1; min-width:0}
.runrow .r1{font-weight:800; font-size:15px}
.runrow .r2{font-size:12.5px; color:var(--muted); margin-top:1px}
.wait{color:var(--exp); font-weight:700}
/* ============ CHIPS / SLABS ============ */
label.f{display:block; font-size:11.5px; font-weight:800; color:var(--muted); margin:16px 3px 7px; text-transform:uppercase; letter-spacing:.6px}
label.f .hint{font-weight:600; text-transform:none; letter-spacing:0; color:var(--faint)}
label.f:first-child{margin-top:2px}
.row2{display:grid; grid-template-columns:1fr 1fr; gap:10px}
.chips{display:flex; flex-wrap:wrap; gap:7px}
.chip{
  padding:10px 14px; border-radius:11px; font-weight:700; font-size:14.5px;
  border:1.5px solid var(--line); background:#fff; color:var(--ink); transition:transform .05s, background .1s, border-color .1s;
}
.chip:active{transform:scale(.96)}
.chip.on{background:var(--field); border-color:var(--field); color:#fff}
.chip.add{color:var(--muted); border-style:dashed; font-weight:700}
.slabs{display:grid; grid-template-columns:1fr 1fr 1fr; gap:9px}
.slab{
  border-radius:14px; padding:15px 6px 12px; text-align:center; font-weight:800; font-size:14.5px;
  border:1.5px solid var(--line); background:#fff; color:var(--muted); transition:transform .06s;
}
.slab .ic{display:block; margin:0 auto 5px; width:24px; height:24px}
.slab:active{transform:scale(.97)}
.slab.on-Sale{background:var(--sale); border-color:var(--sale); color:#fff}
.slab.on-Expense{background:var(--exp); border-color:var(--exp); color:#fff}
.slab.on-Advance{background:var(--adv); border-color:var(--adv); color:#fff}

/* ============ HOME DASHBOARD ============ */
.hero{
  background:linear-gradient(150deg, var(--field-deep), var(--field)); color:#fff;
  border-radius:20px; padding:18px 18px 16px; box-shadow:var(--shadow-lift); position:relative; overflow:hidden;
}
.hero::after{content:""; position:absolute; right:-40px; top:-40px; width:150px; height:150px; border-radius:50%; background:rgba(255,255,255,.05)}
.hero .lbl{font-size:11.5px; font-weight:800; letter-spacing:.8px; text-transform:uppercase; color:rgba(255,255,255,.72)}
.hero .big{font-size:38px; font-weight:800; letter-spacing:-1.2px; margin:3px 0 2px; line-height:1.05}
.hero .big small{font-size:19px; font-weight:700; opacity:.8; margin-right:3px}
.hero .sub{font-size:13px; color:rgba(255,255,255,.82); font-weight:600}
.hero .sub b{color:#fff}
.hero .split{display:flex; gap:18px; margin-top:13px; padding-top:13px; border-top:1px solid rgba(255,255,255,.16)}
.hero .split div{flex:1}
.hero .split .k{font-size:11px; font-weight:700; color:rgba(255,255,255,.68); text-transform:uppercase; letter-spacing:.5px}
.hero .split .v{font-size:16px; font-weight:800; margin-top:2px}
.spark{margin-top:14px}

.tiles{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px}
.tile{background:#fff; border:1px solid var(--line); border-radius:15px; padding:14px; box-shadow:var(--shadow)}
.tile .th{display:flex; align-items:center; gap:7px; font-size:11.5px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--muted)}
.tile .th .ic{width:16px; height:16px}
.tile .amt{font-size:23px; font-weight:800; letter-spacing:-.6px; margin-top:7px}
.tile .amt small{font-size:13px; font-weight:700; color:var(--muted); margin-right:2px}
.tile .meta{font-size:12.5px; color:var(--muted); font-weight:600; margin-top:2px}
.tile.sale .amt{color:var(--sale)} .tile.exp .amt{color:var(--exp)}

.actionrow{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px}
.bigbtn{
  display:flex; align-items:center; justify-content:center; gap:8px; padding:15px; border-radius:14px;
  font-weight:800; font-size:15px; box-shadow:var(--shadow);
}
.bigbtn .ic{width:19px; height:19px}
.bigbtn.pri{background:var(--field); color:#fff}
.bigbtn.sec{background:#fff; color:var(--ink); border:1px solid var(--line)}

.mini-empty{padding:22px 16px; text-align:center; color:var(--muted); font-size:14px; font-weight:600}
.mini-empty .ic{width:30px; height:30px; margin:0 auto 8px; color:var(--faint); display:block}

/* ============ ROW LIST (entries / activity) ============ */
.rowlist{display:flex; flex-direction:column}
.erow{display:flex; align-items:center; gap:12px; padding:13px 15px; border-bottom:1px solid var(--line2); text-align:left; width:100%; background:none}
.erow:last-child{border-bottom:none}
.erow:active{background:var(--line2)}
.erow .ei{width:36px; height:36px; border-radius:10px; flex:none; display:flex; align-items:center; justify-content:center}
.erow .ei svg{width:19px; height:19px}
.ei.sale{background:var(--sale-soft); color:var(--sale)} .ei.exp{background:var(--exp-soft); color:var(--exp)}
.ei.adv{background:var(--adv-soft); color:var(--adv)} .ei.settle{background:var(--settle-soft); color:var(--settle)}
.ei.pay{background:var(--field-soft); color:var(--field-deep)}
.erow .em{flex:1; min-width:0}
.erow .em .t1{font-weight:700; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.erow .em .t2{font-size:12.5px; color:var(--muted); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px}
.erow .ea{text-align:right; flex:none}
.erow .ea .a1{font-weight:800; font-size:15px; letter-spacing:-.3px}
.erow .ea .a1.pos{color:var(--sale)} .erow .ea .a1.neg{color:var(--exp)}
.erow .ea .a2{font-size:11.5px; color:var(--faint); font-weight:600; margin-top:1px}
.daylabel{font-size:12px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; padding:14px 6px 6px}

/* ============ FILTER BAR ============ */
.filterbar{display:flex; gap:7px; overflow-x:auto; padding:2px 0 4px; -webkit-overflow-scrolling:touch; scrollbar-width:none}
.filterbar::-webkit-scrollbar{display:none}
.fchip{white-space:nowrap; padding:8px 13px; border-radius:20px; font-size:13px; font-weight:700; background:#fff; border:1px solid var(--line); color:var(--muted)}
.fchip.on{background:var(--ink); border-color:var(--ink); color:#fff}

/* ============ BASKET ============ */
.basket{margin-top:4px}
.bline{display:flex; align-items:center; gap:11px; padding:13px 14px; border-bottom:1px solid var(--line2)}
.bline:last-child{border-bottom:none}
.bline .bmain{flex:1; min-width:0}
.bline .bt1{font-weight:700; font-size:14.5px}
.bline .bt2{font-size:12.5px; color:var(--muted); font-weight:600; margin-top:1px}
.bline .bamt{font-weight:800; font-size:15px; letter-spacing:-.3px}
.bline .bx{width:30px; height:30px; border-radius:8px; display:flex; align-items:center; justify-content:center; color:var(--exp); background:var(--exp-soft); flex:none}
.bline .bx svg{width:15px; height:15px}
.basket-total{display:flex; align-items:center; justify-content:space-between; padding:14px 15px; font-weight:800; border-top:1.5px solid var(--line)}
.basket-total .bt{font-size:20px; letter-spacing:-.4px; color:var(--sale)}

/* ============ BUTTONS / MISC ============ */
.savebtn{width:100%; padding:16px; border-radius:14px; font-weight:800; font-size:16.5px; color:#fff; margin-top:22px; box-shadow:var(--shadow); display:flex; align-items:center; justify-content:center; gap:8px}
.savebtn .ic{width:19px; height:19px}
.savebtn.t-Sale{background:var(--sale)} .savebtn.t-Expense{background:var(--exp)} .savebtn.t-Advance{background:var(--adv)}
.savebtn:active{transform:scale(.99)}
.ghostbtn{width:100%; padding:14px; border-radius:12px; font-weight:700; font-size:15px; color:var(--muted); margin-top:10px; border:1px solid var(--line); background:#fff}
.linkbtn{background:none; color:var(--field); font-weight:700; font-size:14px; padding:6px}
.addlinebtn{width:100%; padding:13px; border-radius:12px; font-weight:800; font-size:14.5px; color:var(--field); border:1.5px dashed var(--line); background:#fff; display:flex; align-items:center; justify-content:center; gap:7px; margin-top:6px}
.addlinebtn .ic{width:17px; height:17px}
.dangerbtn{color:var(--exp)}

.bigamt{font-size:34px; font-weight:800; letter-spacing:-1px; text-align:center; margin:14px 0 2px; color:var(--ink)}
.bigamt small{font-size:17px; font-weight:700; color:var(--muted); margin-right:3px}
.autohint{text-align:center; font-size:12.5px; color:var(--faint); font-weight:600; min-height:16px}
.editbanner{background:var(--adv-soft); color:#7a5606; border:1px solid #ecd9a3; border-radius:12px; padding:11px 14px; font-size:13.5px; font-weight:700; margin-bottom:14px; display:flex; align-items:center; gap:8px}
.editbanner svg{width:17px; height:17px; flex:none}

.note{font-size:13px; color:var(--muted); font-weight:600; line-height:1.5}
.pill{display:inline-flex; align-items:center; gap:5px; padding:3px 9px; border-radius:20px; font-size:11.5px; font-weight:800}
.pill.a{background:var(--sale-soft); color:var(--field-deep)} .pill.b{background:var(--line2); color:var(--muted)}

/* worker cards */
.wcard{padding:15px}
.wcard .whead{display:flex; align-items:center; justify-content:space-between; gap:10px}
.wcard .wname{font-weight:800; font-size:17px}
.wcard .wfarm{font-size:12.5px; color:var(--muted); font-weight:600}
.wgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:14px 0}
.wstat{background:var(--bg); border-radius:12px; padding:11px 12px}
.wstat .k{font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--muted)}
.wstat .v{font-size:18px; font-weight:800; margin-top:3px; letter-spacing:-.3px}
.wstat .v.owe{color:var(--adv)}
.wbtns{display:flex; gap:9px}
.wbtn{flex:1; padding:12px; border-radius:11px; font-weight:800; font-size:14px; border:1px solid var(--line); background:#fff}
.wbtn.pay{background:var(--field); color:#fff; border-color:var(--field)}

/* summary */
.pnl{padding:4px 2px}
.pnlrow{display:flex; align-items:center; justify-content:space-between; padding:12px 4px; border-bottom:1px solid var(--line2)}
.pnlrow:last-child{border-bottom:none}
.pnlrow .pl{font-size:14.5px; font-weight:600; color:var(--ink); display:flex; align-items:center; gap:9px}
.pnlrow .pl .sw{width:9px; height:9px; border-radius:3px; flex:none}
.pnlrow .pr{font-weight:800; font-size:15px; letter-spacing:-.3px}
.pnlrow.tot{border-top:2px solid var(--line); border-bottom:none; margin-top:4px; padding-top:15px}
.pnlrow.tot .pl{font-weight:800; font-size:16px}
.pnlrow.tot .pr{font-size:20px}
.pos{color:var(--sale)} .neg{color:var(--exp)}
.prodbar{height:8px; border-radius:4px; background:var(--line2); overflow:hidden; margin-top:6px}
.prodbar > i{display:block; height:100%; border-radius:4px; background:var(--field)}
.prodrow{padding:11px 4px; border-bottom:1px solid var(--line2)}
.prodrow:last-child{border-bottom:none}
.prodrow .ptop{display:flex; align-items:center; justify-content:space-between}
.prodrow .pname{font-weight:700; font-size:14.5px}
.prodrow .pv{font-weight:800; font-size:14.5px}
.prodrow .pk{font-size:12px; color:var(--muted); font-weight:600}

/* settings */
.setrow{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:14px 15px; border-bottom:1px solid var(--line2); width:100%; text-align:left; background:none}
.setrow:last-child{border-bottom:none}
.setrow:active{background:var(--line2)}
.setrow .sl{min-width:0}
.setrow .sl .s1{font-weight:700; font-size:15px}
.setrow .sl .s2{font-size:12.5px; color:var(--muted); font-weight:600; margin-top:1px}
.setrow .sr{color:var(--faint); flex:none; display:flex; align-items:center; gap:6px}
.setrow .sr svg{width:18px; height:18px}
.setrow .sr .val{font-size:14px; font-weight:700; color:var(--muted)}

/* toast */
#toast{position:fixed; left:50%; bottom:calc(90px + var(--sab)); transform:translateX(-50%) translateY(20px); z-index:60; background:var(--ink); color:#fff; padding:12px 18px; border-radius:13px; font-weight:700; font-size:14px; box-shadow:var(--shadow-lift); opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; max-width:88vw; text-align:center}
#toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

/* modal */
#modalHost:empty{display:none}
.scrim{position:fixed; inset:0; z-index:50; background:rgba(20,28,22,.42); display:flex; align-items:flex-end; justify-content:center; padding:0; animation:fade .2s}
@keyframes fade{from{opacity:0}}
.sheet{background:var(--bg); width:100%; max-width:600px; border-radius:22px 22px 0 0; padding:8px 18px calc(24px + var(--sab)); max-height:92vh; overflow-y:auto; animation:rise .26s cubic-bezier(.2,.9,.3,1)}
@keyframes rise{from{transform:translateY(100%)}}
.sheet .grip{width:38px; height:4px; border-radius:3px; background:var(--line); margin:8px auto 4px}
.sheet h3{font-size:19px; font-weight:800; margin:8px 2px 4px; letter-spacing:-.3px}
.sheet .sub{font-size:13.5px; color:var(--muted); font-weight:600; margin:0 2px 8px}
.mini{width:100%; border-collapse:collapse; margin:8px 0}
.mini td{padding:9px 2px; font-size:14.5px; border-bottom:1px solid var(--line2)}
.mini td:last-child{text-align:right; font-weight:700}
.mini tr:last-child td{border-bottom:none}
.mini tr.grand td{font-weight:800; font-size:16px; border-top:2px solid var(--line); padding-top:12px}

.settle-badge{display:inline-flex; padding:2px 8px; border-radius:20px; font-size:11px; font-weight:800; background:var(--adv-soft); color:#7a5606}
.drift{background:var(--exp-soft); color:#8a2f16; border:1px solid #eecabd; border-radius:11px; padding:10px 12px; font-size:12.5px; font-weight:700; margin:8px 0}

@media(min-width:640px){
  main{padding-top:6px}
  .tiles, .actionrow{gap:12px}
}

const KEY='field-ledger-v1';
const LEGACY_KEY='farm-ledger-v1';
const local={
  load(){ try{ const v=localStorage.getItem(KEY); return v?JSON.parse(v):null; }catch(e){ return null; } },
  loadLegacy(){ try{ const v=localStorage.getItem(LEGACY_KEY); return v?JSON.parse(v):null; }catch(e){ return null; } },
  save(d){ try{ localStorage.setItem(KEY, JSON.stringify(d)); return true; }catch(e){ return false; } }
};

/* Cloud sync: a single row in a Supabase table keyed by the user's sync code.
   We push/pull the full ledger and merge per-record by updatedAt (last write wins).
   Entirely optional — the app is fully functional with it turned off. */
const Sync={
  cfg:null, status:'off', lastError:'', timer:null,
  init(cfg){ this.cfg=cfg; this.status = (cfg&&cfg.url&&cfg.key&&cfg.code)?'idle':'off'; renderSyncTag(); },
  headers(){ return {'apikey':this.cfg.key,'Authorization':'Bearer '+this.cfg.key,'Content-Type':'application/json','x-sync-code':this.cfg.code,'Prefer':'return=representation'}; },
  base(){ return this.cfg.url.replace(/\/$/,'')+'/rest/v1/ledger'; },
  async pull(){
    if(this.status==='off') return null;
    const r=await fetch(this.base()+'?code=eq.'+encodeURIComponent(this.cfg.code)+'&select=payload,rev', {headers:this.headers()});
    if(!r.ok) throw new Error('pull '+r.status);
    const rows=await r.json();
    return rows.length ? {payload:rows[0].payload, rev:rows[0].rev} : null;
  },
  async push(payload, rev){
    const body={code:this.cfg.code, payload, rev, updated_at:new Date().toISOString()};
    const r=await fetch(this.base()+'?on_conflict=code', {method:'POST', headers:{...this.headers(),'Prefer':'resolution=merge-duplicates,return=minimal'}, body:JSON.stringify(body)});
    if(!r.ok) throw new Error('push '+r.status);
  },
  schedule(){ if(this.status==='off') return; clearTimeout(this.timer); this.timer=setTimeout(()=>doSync('push'), 900); }
};

function defaultCropDefaults(){
  /* days from planting to first harvest, and days between collections once producing */
  return {
    'Terung':{maturity:60, interval:3}, 'Tomatoes':{maturity:70, interval:3},
    'Peria':{maturity:50, interval:2}, 'Labu Air':{maturity:55, interval:1},
    'Timun':{maturity:35, interval:2}, 'Chili':{maturity:75, interval:7}
  };
}
function defaultState(){
  /* Fresh install: start from the baked-in snapshot (backup of 17 Jul 2026),
     brought up to the current schema by migrate(). Existing devices never
     touch this — their localStorage always wins. */
  const d=JSON.parse(JSON.stringify(SEED));
  return migrate(d);
}

function uid(){ return 'e'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function nowMs(){ return Date.now(); }
function round2(n){ return Math.round((Number(n)||0)*100)/100; }
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmt(n){ const v=Number(n)||0; return 'RM '+v.toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtc(n){ const v=Math.round(Number(n)||0); return 'RM '+v.toLocaleString('en-MY'); }
const MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function endOfMonth(ym){ const [y,m]=ym.split('-').map(Number); return ym+'-'+String(new Date(y,m,0).getDate()).padStart(2,'0'); }
function nextDay(ds){ const [y,m,d]=ds.split('-').map(Number); const dt=new Date(y,m-1,d+1); return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0'); }
function nextMonth(ym){ let [y,m]=ym.split('-').map(Number); m++; if(m>12){m=1;y++;} return y+'-'+String(m).padStart(2,'0'); }
function shortDate(ds){ const [y,m,d]=ds.split('-'); return +d+' '+MN[+m-1]; }
function monthLabel(ym){ const [y,m]=ym.split('-'); return MN[+m-1]+' '+y; }
function dateLabel(ds){ const [y,m,d]=ds.split('-'); return +d+' '+MN[+m-1]+' '+y; }
function dowLabel(ds){ const [y,m,d]=ds.split('-').map(Number); return DOW[new Date(y,m-1,d).getDay()]; }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),2100); }

/* ============ MIGRATION (from legacy farm-ledger-v1 or older field-ledger) ============ */
function migrate(d){
  const set=d.settings;
  if(!Array.isArray(set.workers)){
    set.workers=(set.farms||[]).filter(f=>f.worker).map(f=>({id:uid(), name:f.worker, farm:f.name, earnsCommission:true, active:true}));
  }
  if(Array.isArray(set.farms)) for(const f of set.farms) delete f.worker;
  if(!Array.isArray(set.customers)){
    const seen={};
    for(const e of d.entries){
      if(e.type!=='Sale'||!e.customer) continue;
      const n=e.customer.trim(); if(!n) continue; const k=n.toLowerCase();
      if(!seen[k]) seen[k]={id:uid(), name:n, active:true};
    }
    set.customers=Object.values(seen);
  }
  for(const w of set.workers){ if(!w.id) w.id=uid(); if(w.active===undefined) w.active=true; if(w.earnsCommission===undefined) w.earnsCommission=true; }
  for(const c of set.customers){ if(!c.id) c.id=uid(); if(c.active===undefined) c.active=true; }
  if(!set.ratesHistory){
    set.ratesHistory={};
    const src=set.rates||{};
    for(const p of set.produce){ const r=src[p]||{A:0,B:0}; set.ratesHistory[p]=[{from:'0000-01', A:Number(r.A)||0, B:Number(r.B)||0}]; }
  }
  delete set.rates;
  for(const p of set.produce){ if(!set.ratesHistory[p]) set.ratesHistory[p]=[{from:'0000-01', A:0, B:0}]; }
  for(const e of d.entries){
    if(e.type==='Payout' && !e.comThrough){
      const pm=e.payMonth||e.date.slice(0,7);
      e.comFrom=pm+'-01'; e.comThrough=endOfMonth(pm); e.salMonths=[pm];
    }
    if(e.updatedAt===undefined) e.updatedAt=nowMs();
    if(e.deleted===undefined) e.deleted=false;
  }
  if(set.rev===undefined) set.rev=0;
  if(set.sync===undefined) set.sync=null;
  if(set.lastCustomer===undefined) set.lastCustomer='';
  /* v7: crop plantings module */
  if(!Array.isArray(d.plantings)) d.plantings=[];
  if(!set.cropDefaults) set.cropDefaults=defaultCropDefaults();
  for(const p of d.plantings){
    if(!p.id) p.id='p'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);
    if(p.status===undefined) p.status='growing';
    if(p.interval===undefined||p.interval<1) p.interval=Math.max(1, Number(p.interval)||3);
    if(p.updatedAt===undefined) p.updatedAt=nowMs();
    if(p.deleted===undefined) p.deleted=false;
    if(p.notes===undefined) p.notes='';
  }
  set.dataVersion=7;
  return d;
}

/* ============ SELECTORS ============ */
function live(){ return S.entries.filter(e=>!e.deleted); }
function workersList(){ return S.settings.workers.filter(w=>w.active); }
function activeWorkersOfFarm(farm){ return S.settings.workers.filter(w=>w.active && w.farm===farm); }
function farmOfWorker(name){ const w=S.settings.workers.find(w=>w.name===name); return w?w.farm:''; }
function activeCustomers(){ return S.settings.customers.filter(c=>c.active); }
function customerFrequency(){ const f={}; for(const e of live()){ if(e.type==='Sale'&&e.customer) f[e.customer]=(f[e.customer]||0)+1; } return f; }
function customerChoices(){ const freq=customerFrequency(); return activeCustomers().slice().sort((a,b)=>(freq[b.name]||0)-(freq[a.name]||0)); }
function lastPriceFor(category, grade){
  let best=null;
  for(const e of live()){
    if(e.type==='Sale' && e.category===category && (e.grade||'')===(grade||'') && e.price!=null){
      if(!best || e.date>best.date || (e.date===best.date && e.updatedAt>best.updatedAt)) best=e;
    }
  }
  return best?best.price:null;
}
function rateFor(produce, grade, dateStr){
  const hist=S.settings.ratesHistory[produce];
  if(!hist || !hist.length || !grade) return 0;
  const ym=(dateStr||todayStr()).slice(0,7);
  let best=null;
  for(const v of hist){ if(v.from<=ym && (!best || v.from>best.from)) best=v; }
  if(!best) best=hist.slice().sort((a,b)=>a.from.localeCompare(b.from))[0];
  return Number(best[grade]||0);
}
function currentRate(produce, grade){ return rateFor(produce, grade, todayStr()); }
function farmShare(entry, farmName){ if(entry.farm===farmName) return 1; if(entry.farm==='Both') return 0.5; return 0; }

/* commission — one engine produces both the total and the line-by-line
   breakdown, so what you verify is exactly what gets paid */
function commissionFor(worker, ym){ return commissionBetween(worker, ym+'-01', endOfMonth(ym)).amount; }
function commissionBreakdown(worker, fromDate, throughDate){
  const w=S.settings.workers.find(x=>x.name===worker);
  const out={rows:[], peers:1, amount:0, kg:0, n:0};
  if(!w || !w.earnsCommission) return out;
  out.peers=activeWorkersOfFarm(w.farm).filter(x=>x.earnsCommission).length || 1;
  const agg={};
  for(const e of live()){
    if(e.type!=='Sale' || !e.qty) continue;
    if(fromDate && e.date<fromDate) continue;
    if(e.date>throughDate) continue;
    const share=farmShare(e, w.farm); if(!share) continue;
    const r=rateFor(e.category, e.grade||'', e.date); if(!r) continue;
    const key=e.category+'|'+(e.grade||'')+'|'+r;
    if(!agg[key]) agg[key]={cat:e.category, grade:e.grade||'', rate:r, kg:0, rm:0};
    agg[key].kg+=e.qty*share; agg[key].rm+=e.qty*r*share;
    out.kg+=e.qty*share; out.amount+=e.qty*r*share; out.n++;
  }
  out.amount=out.amount/out.peers; out.kg=round2(out.kg);
  out.rows=Object.values(agg).sort((a,b)=>b.rm-a.rm)
    .map(r=>({cat:r.cat, grade:r.grade, rate:r.rate, kg:round2(r.kg), rm:round2(r.rm)}));
  return out;
}
function commissionBetween(worker, fromDate, throughDate){ return commissionBreakdown(worker, fromDate, throughDate); }
function payoutsFor(worker){ return live().filter(e=>e.type==='Payout'&&e.worker===worker); }
function lastPayout(worker){ let best=null; for(const e of payoutsFor(worker)){ if(e.comThrough && (!best || e.comThrough>best.comThrough)) best=e; } return best; }
function comWindowStart(worker){ const lp=lastPayout(worker); return lp ? nextDay(lp.comThrough) : ''; }
function paidSalaryMonths(worker){ const set=new Set(); for(const e of payoutsFor(worker)){ for(const m of (e.salMonths||[])) set.add(m); } return set; }
function salaryFor(worker, ym){ let s=0; for(const p of S.settings.salaryPeriods){ if(p.worker!==worker) continue; if(ym>=p.start && (!p.end || ym<=p.end)) s+=Number(p.salary)||0; } return s; }
function unpaidSalaryMonths(worker){
  const paid=paidSalaryMonths(worker); const cur=todayStr().slice(0,7);
  const starts=S.settings.salaryPeriods.filter(p=>p.worker===worker).map(p=>p.start);
  if(!starts.length) return [];
  let m=starts.slice().sort()[0]; const out=[];
  while(m<=cur){ if(salaryFor(worker,m)>0 && !paid.has(m)) out.push(m); m=nextMonth(m); }
  return out;
}
function sumEntries(fn){ let t=0; for(const e of live()){ t+=fn(e)||0; } return t; }
function advancesFor(worker, ym){ return sumEntries(e=> e.type==='Advance'&&e.worker===worker&&(!ym||e.date.startsWith(ym)) ? e.amount:0); }
function settlementsFor(worker, ym){ return sumEntries(e=> e.type==='Settlement'&&e.worker===worker&&(!ym||e.date.startsWith(ym)) ? e.amount:0); }
function outstanding(worker){ return advancesFor(worker,null)-settlementsFor(worker,null); }

function monthsWithData(){ const set=new Set(live().map(e=>e.date.slice(0,7))); set.add(todayStr().slice(0,7)); return [...set].sort().reverse(); }
function inPeriod(e, sel){ if(sel.startsWith('YEAR-')) return e.date.startsWith(sel.slice(5)); return e.date.startsWith(sel); }
function monthsInPeriod(sel){ if(!sel.startsWith('YEAR-')) return [sel]; const y=sel.slice(5); return monthsWithData().filter(m=>m.startsWith(y)); }

function periodStats(sel){
  const farms=S.settings.farms.map(f=>f.name);
  const st={ sales:0, expenses:0, salary:0, commission:0, salesKg:0, byFarm:{}, byProduce:{}, byFarmProduce:{}, hasBoth:false };
  for(const fn of farms){ st.byFarm[fn]={sales:0, expenses:0, salary:0, commission:0, kg:0}; st.byFarmProduce[fn]={}; }
  for(const e of live()){
    if(!inPeriod(e,sel)) continue;
    if(e.type==='Sale'){
      st.sales+=e.amount; st.salesKg+=e.qty||0;
      if(e.farm==='Both') st.hasBoth=true;
      const key=e.category+(e.grade?' ('+e.grade+')':'');
      for(const fn of farms){
        const sh=farmShare(e,fn); if(!sh) continue;
        st.byFarm[fn].sales+=e.amount*sh; st.byFarm[fn].kg+=(e.qty||0)*sh;
        if(!st.byFarmProduce[fn][key]) st.byFarmProduce[fn][key]={kg:0, rm:0};
        st.byFarmProduce[fn][key].kg+=(e.qty||0)*sh; st.byFarmProduce[fn][key].rm+=e.amount*sh;
      }
      if(!st.byProduce[key]) st.byProduce[key]={kg:0, rm:0};
      st.byProduce[key].kg+=e.qty||0; st.byProduce[key].rm+=e.amount;
    } else if(e.type==='Expense'){
      st.expenses+=e.amount;
      if(st.byFarm[e.farm]) st.byFarm[e.farm].expenses+=e.amount;
    }
  }
  const salWorkers=[...new Set(S.settings.salaryPeriods.map(p=>p.worker))];
  for(const ym of monthsInPeriod(sel)){
    for(const name of salWorkers){
      const sal=salaryFor(name,ym); if(!sal) continue;
      st.salary+=sal; const farm=farmOfWorker(name);
      if(st.byFarm[farm]) st.byFarm[farm].salary+=sal;
    }
    for(const w of S.settings.workers){
      if(!w.active) continue;
      const com=commissionFor(w.name,ym); if(!com) continue;
      st.commission+=com;
      if(st.byFarm[w.farm]) st.byFarm[w.farm].commission+=com;
    }
  }
  st.costs=st.expenses+st.salary+st.commission;
  st.profit=st.sales-st.costs;
  return st;
}

/* day/MTD snapshot for the dashboard */
function daySnapshot(ds){
  const s={salesAmt:0, salesKg:0, salesN:0, expAmt:0, expN:0, advAmt:0};
  for(const e of live()){
    if(e.date!==ds) continue;
    if(e.type==='Sale'){ s.salesAmt+=e.amount; s.salesKg+=e.qty||0; s.salesN++; }
    else if(e.type==='Expense'){ s.expAmt+=e.amount; s.expN++; }
    else if(e.type==='Advance'){ s.advAmt+=e.amount; }
  }
  return s;
}

/* ============ SAVE + SYNC ORCHESTRATION ============ */
function bumpRev(){ S.settings.rev=(S.settings.rev||0)+1; }
function save(opts){
  local.save(S);
  renderSyncTag();
  if(!(opts&&opts.noSync)) Sync.schedule();
}
function touch(e){ e.updatedAt=nowMs(); }

/* merge remote payload into local by record id, last-write-wins on updatedAt */
function mergeRemote(remote){
  if(!remote) return false;
  const data = remote.payload || remote;   /* pull() nests the ledger under .payload */
  if(!data || !Array.isArray(data.entries)) return false;
  let changed=false;
  const byId={}; for(const e of S.entries) byId[e.id]=e;
  for(const re of data.entries){
    if(!re || !re.id) continue;
    const cur=byId[re.id];
    if(!cur){ S.entries.push(re); byId[re.id]=re; changed=true; }
    else if((re.updatedAt||0) > (cur.updatedAt||0)){ Object.assign(cur, re); changed=true; }
  }
  /* plantings merge — same id + last-write-wins rule */
  if(Array.isArray(data.plantings)){
    if(!Array.isArray(S.plantings)) S.plantings=[];
    const pById={}; for(const p of S.plantings) pById[p.id]=p;
    for(const rp of data.plantings){
      if(!rp || !rp.id) continue;
      const cur=pById[rp.id];
      if(!cur){ S.plantings.push(rp); pById[rp.id]=rp; changed=true; }
      else if((rp.updatedAt||0) > (cur.updatedAt||0)){ Object.assign(cur, rp); changed=true; }
    }
  }
  /* settings: whichever rev is higher wins (settings change rarely; simple + safe for single owner) */
  if(data.settings && (data.settings.rev||0) > (S.settings.rev||0)){
    const keepSync=S.settings.sync;
    S.settings=data.settings; S.settings.sync=keepSync; changed=true;
  }
  return changed;
}

let syncing=false;
async function doSync(mode){
  if(Sync.status==='off' || syncing) return;
  syncing=true; Sync.status='busy'; renderSyncTag();
  try{
    const remote=await Sync.pull();
    const changed=mergeRemote(remote);
    if(changed){ local.save(S); if(['home','entries','workers','summary','crops'].includes(tab)) renderTab(tab); }
    const payload={entries:S.entries, plantings:S.plantings||[], settings:S.settings};
    await Sync.push(payload, (remote&&remote.rev||0)+1);
    Sync.status='idle'; Sync.lastError='';
  }catch(err){
    Sync.status='error'; Sync.lastError=String(err.message||err);
  }
  syncing=false; renderSyncTag();
  if(tab==='settings') renderSettings();
}
function renderSyncTag(){
  const el=document.getElementById('syncTag'); if(!el) return;
  const txt=document.getElementById('syncTxt');
  el.className='synctag';
  if(Sync.status==='off'){ el.classList.add('off'); return; }
  if(Sync.status==='busy'){ el.classList.add('busy'); txt.textContent='Syncing'; }
  else if(Sync.status==='error'){ el.classList.add('err'); txt.textContent='Sync error'; }
  else { el.classList.add('ok'); txt.textContent='Synced'; }
}

/* ============ SPARKLINE ============ */
function sparkline(vals, w, h, color){
  if(!vals.length) return '';
  const max=Math.max(1, ...vals.map(Math.abs));
  const step= vals.length>1 ? w/(vals.length-1) : 0;
  const pts=vals.map((v,i)=>[i*step, h - (Math.abs(v)/max)*(h-4) - 2]);
  const d=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=d+` L ${w} ${h} L 0 ${h} Z`;
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" preserveAspectRatio="none" aria-hidden="true">
    <path d="${area}" fill="${color}" opacity=".16"/>
    <path d="${d}" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${pts.length?`<circle cx="${pts[pts.length-1][0].toFixed(1)}" cy="${pts[pts.length-1][1].toFixed(1)}" r="3" fill="${color}"/>`:''}
  </svg>`;
}

  document.getElementById('hdrTitle').textContent='Field Ledger';
  const today=todayStr(); const ym=today.slice(0,7);
  const ds=daySnapshot(today);
  const mtd=periodStats(ym);
  const farms=S.settings.farms.map(f=>f.name);

  /* profit sparkline: month-to-date daily profit (sales - expenses per day; labor is monthly so shown separately) */
  const [yy,mm]=ym.split('-').map(Number);
  const todayD=new Date().getDate();
  const daily=[];
  for(let d=1; d<=todayD; d++){
    const key=ym+'-'+String(d).padStart(2,'0');
    let s=0; for(const e of live()){ if(e.date!==key) continue; if(e.type==='Sale') s+=e.amount; else if(e.type==='Expense') s-=e.amount; }
    daily.push(s);
  }

  let owed=0, owe=0;
  for(const w of workersList()){ const o=outstanding(w.name); if(o>0) owe+=o; }

  /* HERO — month to date profit */

    <div class="lbl">${monthLabel(ym)} · profit to date</div>
    <div class="big num"><small>RM</small>${(mtd.profit<0?'−':'')+Math.abs(Math.round(mtd.profit)).toLocaleString('en-MY')}</div>
    <div class="sub num">Sales <b>${fmtc(mtd.sales)}</b> · Costs <b>${fmtc(mtd.costs)}</b></div>
    <div class="spark">${sparkline(daily, 300, 40, '#ffffff')}</div>
    <div class="split num">
      ${farms.map(fn=>{ const f=mtd.byFarm[fn]; const p=f.sales-(f.expenses+f.salary+f.commission); return `<div><div class="k">${esc(fn)}</div><div class="v">${(p<0?'−':'')+'RM '+Math.abs(Math.round(p)).toLocaleString('en-MY')}</div></div>`; }).join('')}
    </div>
  </div>`;

  /* TODAY tiles */
  html+=`<h2 class="sec">Today <span class="side">${ds_activity(ds)}</span></h2>`;
  html+=`<div class="tiles">
    <div class="tile sale">
      <div class="th">${svg('sale','ic')} Sales</div>
      <div class="amt num"><small>RM</small>${Math.round(ds.salesAmt).toLocaleString('en-MY')}</div>
      <div class="meta num">${ds.salesN?`${round2(ds.salesKg).toLocaleString('en-MY')} kg · ${ds.salesN} line${ds.salesN>1?'s':''}`:'No sales yet'}</div>
    </div>
    <div class="tile exp">
      <div class="th">${svg('exp','ic')} Expenses</div>
      <div class="amt num"><small>RM</small>${Math.round(ds.expAmt).toLocaleString('en-MY')}</div>
      <div class="meta num">${ds.expN?`${ds.expN} item${ds.expN>1?'s':''}`:'None logged'}</div>
    </div>
  </div>`;

  /* today's farm run — which farm to visit, what to collect */
  html+=farmRunHTML();

  /* quick actions */
  html+=`<div class="actionrow">
    <button class="bigbtn pri" onclick="startRecord('Sale')">${svg('plus','ic')} Record sale</button>
    <button class="bigbtn sec" onclick="startRecord('Expense')">${svg('exp','ic')} Add expense</button>
  </div>`;

  /* cash position */
  if(owe>0){
    html+=`<h2 class="sec">Cash position</h2>`;
    html+=`<div class="card"><button class="setrow" onclick="switchTab('workers')">
      <div class="sl"><div class="s1">Advances owed by workers</div><div class="s2">Tap to settle or pay</div></div>
      <div class="sr"><span class="val num">${fmt(owe)}</span>${svg('chevR')}</div>
    </button></div>`;
  }

  /* recent activity */
  const recent=live().slice().sort((a,b)=> b.date.localeCompare(a.date) || (b.updatedAt||0)-(a.updatedAt||0)).slice(0,6);
  html+=`<h2 class="sec">Recent activity <span class="side"><button class="linkbtn" onclick="switchTab('entries')">See all</button></span></h2>`;
  if(!recent.length){
    html+=`<div class="card"><div class="mini-empty">${svg('leaf','ic')}Nothing recorded yet.<br>Tap <b>Record sale</b> to begin.</div></div>`;
  }else{
    html+=`<div class="card rowlist">`+recent.map(e=>entryRow(e)).join('')+`</div>`;
  }

  document.getElementById('view').innerHTML=html;

function ds_activity(ds){
  const n=ds.salesN+ds.expN+(ds.advAmt?1:0);
  return n? `${n} entr${n>1?'ies':'y'}` : '—';
}

/* ============ SHARED: entry row ============ */
function entryTypeMeta(e){
  if(e.type==='Sale') return {cls:'sale', ic:'sale', sign:'+'};
  if(e.type==='Expense') return {cls:'exp', ic:'exp', sign:'−'};
  if(e.type==='Advance') return {cls:'adv', ic:'adv', sign:'−'};
  if(e.type==='Settlement') return {cls:'settle', ic:'settle', sign:'+'};
  if(e.type==='Payout') return {cls:'pay', ic:'pay', sign:'−'};
  return {cls:'exp', ic:'exp', sign:''};
}
function entryTitle(e){
  if(e.type==='Sale') return e.category+(e.grade?' '+e.grade:'');
  if(e.type==='Expense') return e.category;
  if(e.type==='Advance') return 'Advance · '+(e.worker||'');
  if(e.type==='Settlement') return 'Settled · '+(e.worker||'');
  if(e.type==='Payout') return 'Paid · '+(e.worker||'');
  return e.category||e.type;
}
function entrySub(e){
  const bits=[e.farm];
  if(e.type==='Sale'){ if(e.customer) bits.push(e.customer); if(e.qty!=null) bits.push(round2(e.qty)+' kg'); }
  else if(e.customer) bits.push(e.customer);
  return bits.filter(Boolean).join(' · ');
}
function entryRow(e, showDate){
  const m=entryTypeMeta(e);
  const amtCls = (e.type==='Sale'||e.type==='Settlement')?'pos':'neg';
  return `<button class="erow" onclick="openEntry('${e.id}')">
    <div class="ei ${m.cls}">${svg(m.ic)}</div>
    <div class="em">
      <div class="t1">${esc(entryTitle(e))}</div>
      <div class="t2">${esc(entrySub(e))}</div>
    </div>
    <div class="ea">
      <div class="a1 ${amtCls} num">${m.sign}${fmt(e.amount).replace('RM ','')}</div>
      <div class="a2 num">${showDate?shortDate(e.date):(e.price!=null?'@'+e.price:'')}</div>
    </div>
  </button>`;
}

/* ============ RECORD (basket) ============ */
function newBasketLine(prev){
  const set=S.settings;
  const cat=(prev&&prev.category)||set.produce[0];
  const grade=(prev&&prev.grade)||'A';
  const lp=lastPriceFor(cat, grade);
  return {
    lid:'l'+Math.random().toString(36).slice(2,7),
    category:cat, grade, qty:'', price: lp!=null?String(lp):'', pAuto:lp!=null, amount:'',
    customer:(prev&&prev.customer)||set.lastCustomer||''
  };
}
function startRecord(type){
  basket={ mode:type||'Sale', farm:pickFarm(), date:todayStr(), notes:'',
           lines: (type==='Sale'||!type)?[newBasketLine()]:[],
           expCat:S.settings.expenseCats[0], expAmt:'', expDesc:'',
           advWorker:'', advAmt:'', advDesc:'' };
  editingId=null;
  switchTab('record');
}
function pickFarm(){ const set=S.settings; return (set.lastFarm && set.farms.some(f=>f.name===set.lastFarm)) ? set.lastFarm : set.farms[0].name; }

  if(!basket) startRecord('Sale');

  const b=basket; const farms=S.settings.farms.map(f=>f.name);
  const farmChoices = b.mode==='Sale' ? farms.concat(['Both']) : farms;

  let html='';
  if(editingId) html+=`<div class="editbanner">${svg('edit')} Editing a saved entry — changes apply on save.</div>`;

    [['Sale','sale'],['Expense','exp'],['Advance','adv']].map(([x,ic])=>`<button class="slab ${b.mode===x?'on-'+x:''}" aria-pressed="${b.mode===x}" onclick="setMode('${x}')">${svg(ic,'ic')}${x}</button>`).join('')+
  `</div>`;

  html+=`<label class="f" id="farmLbl">Farm</label><div class="chips" role="group" aria-labelledby="farmLbl">`+
    farmChoices.map(fn=>`<button class="chip ${b.farm===fn?'on':''}" onclick="setBasketFarm('${esc(fn)}')">${esc(fn)}</button>`).join('')+`</div>`;

  if(b.mode==='Sale'){

    else html+=b.lines.map((ln,i)=>basketLineRow(ln,i)).join('');

    if(b.lines.length) html+=`<div class="basket-total"><span>Basket total</span><span class="bt num">${fmt(total)}</span></div>`;
    html+=`</div>`;

  } else if(b.mode==='Expense'){
    html+=`<label class="f" id="ecLbl">Category</label><div class="chips" role="group" aria-labelledby="ecLbl">`+
      S.settings.expenseCats.map(c=>`<button class="chip ${b.expCat===c?'on':''}" onclick="setB('expCat',${JSON.stringify(c).replace(/"/g,'&quot;')})">${esc(c)}</button>`).join('')+`</div>`;
    html+=`<label class="f" for="expAmt">Amount (RM)</label><input id="expAmt" type="number" inputmode="decimal" step="any" value="${esc(b.expAmt)}" oninput="setBnum('expAmt',this.value)" placeholder="0.00">`;

    html+=`<label class="f" for="expDesc">Description <span class="hint">(optional)</span></label><input id="expDesc" value="${esc(b.expDesc)}" oninput="setBraw('expDesc',this.value)" placeholder="e.g. water pump repair">`;
  } else {
    const ws=activeWorkersOfFarm(b.farm);
    html+=`<label class="f" id="awLbl">Worker</label><div class="chips" role="group" aria-labelledby="awLbl">`+
      (ws.length?ws.map(w=>`<button class="chip ${b.advWorker===w.name?'on':''}" onclick="setB('advWorker',${JSON.stringify(w.name).replace(/"/g,'&quot;')})">${esc(w.name)}</button>`).join(''):
      `<span class="note">No active worker on ${esc(b.farm)}. Add one in Settings.</span>`)+`</div>`;
    html+=`<label class="f" for="advAmt">Amount (RM)</label><input id="advAmt" type="number" inputmode="decimal" step="any" value="${esc(b.advAmt)}" oninput="setBnum('advAmt',this.value)" placeholder="0.00">`;
    html+=`<div class="bigamt num"><small>RM</small>${(Number(b.advAmt)||0).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2})}</div>`;
    html+=`<label class="f" for="advDesc">What for <span class="hint">(optional)</span></label><input id="advDesc" value="${esc(b.advDesc)}" oninput="setBraw('advDesc',this.value)" placeholder="e.g. groceries, meals">`;
  }

  html+=`<div class="row2" style="margin-top:4px">
    <div><label class="f" for="recDate">Date</label><input id="recDate" type="date" value="${esc(b.date)}" oninput="setBraw('date',this.value)"></div>
    <div><label class="f" for="recNotes">Notes</label><input id="recNotes" value="${esc(b.notes)}" oninput="setBraw('notes',this.value)" placeholder="optional"></div>
  </div>`;

  const label = editingId ? 'Update entry' : (b.mode==='Sale' ? `Save basket${b.lines.length?' · '+b.lines.length+' line'+(b.lines.length>1?'s':''):''}` : 'Save '+b.mode.toLowerCase());
  html+=`<button class="savebtn t-${b.mode}" onclick="saveBasket()">${svg('check','ic')} ${label}</button>`;
  if(editingId) html+=`<button class="ghostbtn" onclick="cancelRecord()">Cancel</button>`;

  document.getElementById('view').innerHTML=html;
}
function lineAmt(ln){ if(ln.amount!=='') return Number(ln.amount)||0; if(ln.qty&&ln.price) return round2(Number(ln.qty)*Number(ln.price)); return 0; }
function basketLineRow(ln, i){
  const custs=customerChoices();
  const amt=lineAmt(ln);
  return `<div class="bline" style="flex-wrap:wrap; align-items:flex-start">

      </div>
      <div class="bamt num">${amt?fmt(amt).replace('RM ','RM '):''}</div>
      <button class="bx" onclick="removeLine(${i})" aria-label="Remove line">${svg('x')}</button>
    </div>
    <div class="chips" style="margin:4px 0">`+
      S.settings.produce.map(c=>`<button class="chip ${ln.category===c?'on':''}" style="font-size:13px; padding:7px 11px" onclick="setLine(${i},'category',${JSON.stringify(c).replace(/"/g,'&quot;')})">${esc(c)}</button>`).join('')+`</div>
    <div class="chips" style="margin:2px 0 8px">`+
      ['A','B',''].map(g=>`<button class="chip ${ln.grade===g?'on':''}" style="font-size:13px; padding:7px 12px" onclick="setLine(${i},'grade','${g}')">${g||'N/A'}</button>`).join('')+`</div>
    <div class="row2" style="width:100%">
      <div><input type="number" inputmode="decimal" step="any" value="${esc(ln.qty)}" oninput="setLineNum(${i},'qty',this.value)" placeholder="kg" aria-label="Quantity kg"></div>
      <div><input type="number" inputmode="decimal" step="any" value="${esc(ln.price)}" oninput="setLineNum(${i},'price',this.value)" placeholder="RM/kg" aria-label="Price per kg"></div>
    </div>
    <div class="chips" style="width:100%; margin-top:8px">`+
      custs.map(c=>`<button class="chip ${ln.customer===c.name?'on':''}" style="font-size:13px; padding:7px 11px" onclick="setLineCust(${i},${JSON.stringify(c.name).replace(/"/g,'&quot;')})">${esc(c.name)}</button>`).join('')+
      `<button class="chip add" style="font-size:13px; padding:7px 11px" onclick="newCustomerForLine(${i})">＋ New</button></div>
  </div>`;
}

/* basket mutations */
function setMode(m){ basket.mode=m; if(m==='Sale'&&!basket.lines.length) basket.lines=[newBasketLine()]; if(m!=='Sale'&&basket.farm==='Both') basket.farm=S.settings.farms[0].name; renderRecord(); }
function setBasketFarm(fn){ basket.farm=fn; if(fn!=='Both'){ S.settings.lastFarm=fn; save({noSync:true}); } if(basket.mode==='Advance') basket.advWorker=(activeWorkersOfFarm(fn)[0]||{}).name||''; renderRecord(); }
function setB(k,v){ basket[k]=v; renderRecord(); }
function setBraw(k,v){ basket[k]=v; }   /* text inputs — no re-render (keeps keyboard) */
function setBnum(k,v){ basket[k]=v; const el=document.getElementById(k==='expAmt'?'expAmt':k==='advAmt'?'advAmt':k); const big=el&&el.parentNode.querySelector('.bigamt'); if(big) big.innerHTML='<small>RM</small>'+(Number(v)||0).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function addLine(){ const prev=basket.lines[basket.lines.length-1]; basket.lines.push(newBasketLine(prev)); renderRecord(); }
function removeLine(i){ basket.lines.splice(i,1); renderRecord(); }
function setLine(i,k,v){
  const ln=basket.lines[i]; ln[k]=v;
  if((k==='category'||k==='grade') && (ln.pAuto||ln.price==='')){ const lp=lastPriceFor(ln.category, ln.grade); ln.price=lp!=null?String(lp):''; ln.pAuto=lp!=null; ln.amount=''; }
  renderRecord();
}
function setLineNum(i,k,v){
  const ln=basket.lines[i]; ln[k]=v; if(k==='price') ln.pAuto=false; ln.amount='';
  /* update just this line's amount + basket total without re-render */
  const amt=lineAmt(ln);
  const rows=document.querySelectorAll('.bline'); const row=rows[i];
  if(row){ const a=row.querySelector('.bamt'); if(a) a.textContent=amt?fmt(amt):''; }
  const tot=basket.lines.reduce((s,l)=>s+lineAmt(l),0);
  const t=document.querySelector('.basket-total .bt'); if(t) t.textContent=fmt(tot);
}
function setLineCust(i,name){ basket.lines[i].customer = basket.lines[i].customer===name?'':name; S.settings.lastCustomer=name; renderRecord(); }
function newCustomerForLine(i){
  const v=prompt('New customer name'); if(!v||!v.trim()) return;
  const name=v.trim(); const ex=S.settings.customers.find(c=>c.name.toLowerCase()===name.toLowerCase());
  if(ex){ ex.active=true; basket.lines[i].customer=ex.name; } else { S.settings.customers.push({id:uid(), name, active:true}); basket.lines[i].customer=name; }
  S.settings.lastCustomer=basket.lines[i].customer; bumpRev(); save(); renderRecord();
}

function saveBasket(){
  const b=basket;
  if(!b.date){ toast('Pick a date'); return; }
  if(editingId){ return saveEditedEntry(); }

  if(b.mode==='Sale'){
    const valid=b.lines.filter(ln=> lineAmt(ln)>0 );
    if(!valid.length){ toast('Add at least one line with quantity and price'); return; }
    let n=0, total=0;
    for(const ln of valid){
      const amt=round2(lineAmt(ln));
      S.entries.push({ id:uid(), date:b.date, farm:b.farm, type:'Sale', category:ln.category,
        customer:(ln.customer||'').trim(), grade:ln.grade,
        qty: ln.qty!==''?Number(ln.qty):null, price: ln.price!==''?Number(ln.price):null,
        amount:amt, worker:'', notes:(b.notes||'').trim(), updatedAt:nowMs(), deleted:false });
      n++; total+=amt;
    }
    /* a sale is proof of collection — keep the crop schedule in step */
    const touched=autoCollectFromSale(b.farm, b.date, valid.map(l=>l.category));
    save(); toast(`Saved ${n} sale line${n>1?'s':''} · ${fmt(total)}`+(touched?' · crop log updated':''));
  } else if(b.mode==='Expense'){
    const amt=round2(b.expAmt);
    if(!amt||amt<=0){ toast('Enter an amount'); return; }
    S.entries.push({ id:uid(), date:b.date, farm:b.farm, type:'Expense', category:b.expCat, customer:(b.expDesc||'').trim(),
      grade:'', qty:null, price:null, amount:amt, worker:'', notes:(b.notes||'').trim(), updatedAt:nowMs(), deleted:false });
    save(); toast('Expense saved · '+fmt(amt));
  } else {
    const amt=round2(b.advAmt);
    if(!amt||amt<=0){ toast('Enter an amount'); return; }
    if(!b.advWorker){ toast('Pick a worker'); return; }
    S.entries.push({ id:uid(), date:b.date, farm:b.farm, type:'Advance', category:'Advance', customer:(b.advDesc||'').trim(),
      grade:'', qty:null, price:null, amount:amt, worker:b.advWorker, notes:(b.notes||'').trim(), updatedAt:nowMs(), deleted:false });
    save(); toast('Advance saved · '+fmt(amt));
  }
  basket=null; switchTab('home');
}

function cancelRecord(){ basket=null; editingId=null; switchTab(editingId?'entries':'home'); }

/* ============ ENTRIES ============ */
function renderEntries(){
  document.getElementById('hdrTitle').textContent='Entries';
  const months=monthsWithData();
  const farms=S.settings.farms.map(f=>f.name);
  const f=entryFilters;
  let list=live().slice().sort((a,b)=> b.date.localeCompare(a.date) || (b.updatedAt||0)-(a.updatedAt||0));
  if(f.farm!=='All') list=list.filter(e=>e.farm===f.farm||(e.farm==='Both'&&e.type==='Sale'));
  if(f.type!=='All') list=list.filter(e=>e.type===f.type);
  if(f.month!=='All') list=list.filter(e=>e.date.startsWith(f.month));

  let html='';
  html+=`<div class="filterbar" role="group" aria-label="Filter by type">`+
    ['All','Sale','Expense','Advance','Payout'].map(t=>`<button class="fchip ${f.type===t?'on':''}" onclick="setFilter('type','${t}')">${t}</button>`).join('')+`</div>`;
  html+=`<div class="filterbar" style="margin-top:6px" role="group" aria-label="Filter by farm and month">`+
    ['All',...farms].map(fn=>`<button class="fchip ${f.farm===fn?'on':''}" onclick="setFilter('farm','${esc(fn)}')">${esc(fn)}</button>`).join('')+
    months.map(m=>`<button class="fchip ${f.month===m?'on':''}" onclick="setFilter('month','${m}')">${monthLabel(m)}</button>`).join('')+`</div>`;

  if(!list.length){
    html+=`<div class="card" style="margin-top:14px"><div class="mini-empty">${svg('entries','ic')}No entries match these filters.</div></div>`;
    document.getElementById('view').innerHTML=html; return;
  }

  /* group by date */
  const groups={}; for(const e of list){ (groups[e.date]=groups[e.date]||[]).push(e); }
  html+=`<div style="margin-top:8px">`;
  for(const date of Object.keys(groups)){
    const dayEntries=groups[date];
    let dayNet=0; for(const e of dayEntries){ if(e.type==='Sale'||e.type==='Settlement') dayNet+=e.amount; else dayNet-=e.amount; }
    html+=`<div class="daylabel"><span>${dowLabel(date)} · ${dateLabel(date)}</span></div>`;
    html+=`<div class="card rowlist">`+dayEntries.map(e=>entryRow(e)).join('')+`</div>`;
  }
  html+=`</div>`;
  document.getElementById('view').innerHTML=html;
}
function setFilter(k,v){ entryFilters[k]=v; renderEntries(); }

/* entry detail sheet */
function openEntry(id){
  const e=live().find(x=>x.id===id); if(!e) return;
  const m=entryTypeMeta(e);
  let rows='';
  const add=(k,v)=> v!=null&&v!==''? rows+=`<tr><td>${k}</td><td class="num">${esc(v)}</td></tr>`:'';
  add('Type', e.type); add('Date', dateLabel(e.date)); add('Farm', e.farm);
  if(e.type==='Sale'){ add('Produce', e.category+(e.grade?' · Grade '+e.grade:'')); add('Customer', e.customer); if(e.qty!=null) add('Quantity', round2(e.qty)+' kg'); if(e.price!=null) add('Price', 'RM '+e.price+'/kg'); }
  else{ add('Category', e.category); if(e.worker) add('Worker', e.worker); if(e.customer) add('Description', e.customer); }
  if(e.type==='Payout'){
    add('Period', dateLabel(e.comFrom)+' → '+dateLabel(e.comThrough));
    /* the receipt as it was on pay day — later rate or sale edits never rewrite it */
    if(Array.isArray(e.comLines)) for(const r of e.comLines){
      add(r.cat+(r.grade?' '+r.grade:''), round2(r.kg).toLocaleString('en-MY')+' kg × '+Number(r.rate).toFixed(2)+' = '+fmt(r.rm));
    }
    if((e.comPeers||1)>1) add('Commission split', '÷ '+e.comPeers+' workers');
    if(e.com!=null) add('Commission', fmt(e.com));
    if(e.sal!=null) add('Salary'+(e.salMonths&&e.salMonths.length?' ('+e.salMonths.map(monthLabel).join(', ')+')':''), fmt(e.sal));
    if(e.deduct) add('Advances deducted', '− '+fmt(e.deduct));
  }
  if(e.notes) add('Notes', e.notes);
  rows+=`<tr class="grand"><td>Amount</td><td class="num ${(e.type==='Sale'||e.type==='Settlement')?'pos':'neg'}">${m.sign} ${fmt(e.amount)}</td></tr>`;

  const editable = e.type!=='Payout';   /* payouts are edited via the pay-day flow / reopened by delete */
  let actions='';
  if(editable) actions+=`<button class="ghostbtn" onclick="editEntry('${e.id}')">${svg('edit')} Edit</button>`;
  actions+=`<button class="ghostbtn dangerbtn" onclick="deleteEntry('${e.id}')">${svg('trash')} Delete</button>`;

  showSheet(`
    <h3>${esc(entryTitle(e))}</h3>
    <div class="sub">${esc(entrySub(e))}</div>
    <table class="mini">${rows}</table>
    ${e.type==='Payout'?`<div class="note" style="margin:4px 2px 10px">This is a recorded payment. Deleting it reopens that pay period so you can pay again.</div>`:''}
    ${actions}
  `);
}
function editEntry(id){
  closeSheet();
  const e=live().find(x=>x.id===id); if(!e) return;
  editingId=id;
  if(e.type==='Sale'){
    basket={ mode:'Sale', farm:e.farm, date:e.date, notes:e.notes||'',
      lines:[{lid:'l0', category:e.category, grade:e.grade||'A', qty:e.qty!=null?String(e.qty):'', price:e.price!=null?String(e.price):'', pAuto:false, amount:String(e.amount), customer:e.customer||''}],
      expCat:S.settings.expenseCats[0], expAmt:'', expDesc:'', advWorker:'', advAmt:'', advDesc:'' };
  } else if(e.type==='Expense'){
    basket={ mode:'Expense', farm:e.farm, date:e.date, notes:e.notes||'', lines:[], expCat:e.category, expAmt:String(e.amount), expDesc:e.customer||'', advWorker:'', advAmt:'', advDesc:'' };
  } else if(e.type==='Advance'){
    basket={ mode:'Advance', farm:e.farm, date:e.date, notes:e.notes||'', lines:[], expCat:S.settings.expenseCats[0], expAmt:'', expDesc:'', advWorker:e.worker||'', advAmt:String(e.amount), advDesc:e.customer||'' };
  } else if(e.type==='Settlement'){
    /* settlement edited as a simple amount sheet */
    return editSettlement(e);
  }
  switchTab('record');
}
function saveEditedEntry(){
  const b=basket; const i=S.entries.findIndex(e=>e.id===editingId);
  if(i<0){ editingId=null; basket=null; switchTab('entries'); return; }
  const orig=S.entries[i];
  if(b.mode==='Sale'){
    const ln=b.lines[0]; const amt=round2(lineAmt(ln));
    if(!amt||amt<=0){ toast('Enter quantity and price'); return; }
    Object.assign(orig,{ farm:b.farm, date:b.date, category:ln.category, grade:ln.grade, customer:(ln.customer||'').trim(),
      qty: ln.qty!==''?Number(ln.qty):null, price: ln.price!==''?Number(ln.price):null, amount:amt, notes:(b.notes||'').trim() });
  } else if(b.mode==='Expense'){
    const amt=round2(b.expAmt); if(!amt||amt<=0){ toast('Enter an amount'); return; }
    Object.assign(orig,{ farm:b.farm, date:b.date, category:b.expCat, customer:(b.expDesc||'').trim(), amount:amt, notes:(b.notes||'').trim() });
  } else {
    const amt=round2(b.advAmt); if(!amt||amt<=0){ toast('Enter an amount'); return; }
    if(!b.advWorker){ toast('Pick a worker'); return; }
    Object.assign(orig,{ farm:b.farm, date:b.date, worker:b.advWorker, customer:(b.advDesc||'').trim(), amount:amt, notes:(b.notes||'').trim() });
  }
  touch(orig); editingId=null; basket=null; save(); toast('Entry updated'); switchTab('entries');
}
function deleteEntry(id){
  closeSheet();
  if(!confirm('Delete this entry? You can restore it later from a backup, but not from here.')) return;
  const e=S.entries.find(x=>x.id===id); if(!e) return;
  e.deleted=true; touch(e); save(); toast('Entry deleted'); renderTab(tab);
}
function editSettlement(e){

    <div class="sub">${esc(e.worker)} · ${dateLabel(e.date)}</div>
    <label class="f" for="esAmt">Amount (RM)</label>
    <input id="esAmt" type="number" inputmode="decimal" step="any" value="${e.amount}">

function commitSettlementEdit(id){

/* ============ PAY DAY ============ */
let payState=null;
function openPayout(worker){
  const win=comWindowStart(worker);
  const unpaid=unpaidSalaryMonths(worker);
  payState={ worker, through:todayStr(), win, salSel:new Set(unpaid), deduct:'' };
  const bal=outstanding(worker);
  showSheet(`
    <h3>Pay day</h3>
    <div class="sub">${esc(worker)} · commission since ${win?dateLabel(win):'the start'}</div>
    <label class="f" for="payThrough">Pay commission through</label>
    <input id="payThrough" type="date" value="${todayStr()}" min="${win||''}" onchange="payThroughChange(this.value)">
    <label class="f">Salary months to include <span class="hint">(tap to toggle)</span></label>
    <div class="chips" id="salChips"></div>
    <table class="mini num" id="payTable"></table>
    <label class="f" for="payDeduct">Deduct advances (RM) <span class="hint">${bal>0?'owes '+fmt(bal):'nothing owed'}</span></label>
    <input id="payDeduct" type="number" inputmode="decimal" step="any" placeholder="0.00" oninput="payDeductChange(this.value)">
    <div class="note" id="payNote" style="margin:6px 2px"></div>
    <label class="f" for="payDate">Payment date</label>
    <input id="payDate" type="date" value="${todayStr()}">
    <button class="savebtn" style="background:var(--field); margin-top:16px" onclick="commitPayout()">${svg('pay','ic')} Record payment</button>
  `);
  renderPaySal(); renderPayTable();
}
function payThroughChange(v){ payState.through=v; renderPayTable(); }
function payDeductChange(v){ payState.deduct=v; renderPayTable(); }
function renderPaySal(){
  const p=payState; const unpaid=unpaidSalaryMonths(p.worker);
  const host=document.getElementById('salChips'); if(!host) return;
  if(!unpaid.length){ host.innerHTML='<span class="note">No unpaid salary months.</span>'; return; }
  host.innerHTML=unpaid.map(m=>`<button class="chip ${p.salSel.has(m)?'on':''}" onclick="toggleSalMonth('${m}')">${monthLabel(m)}</button>`).join('');
}
function toggleSalMonth(m){ const p=payState; if(p.salSel.has(m)) p.salSel.delete(m); else p.salSel.add(m); renderPaySal(); renderPayTable(); }
function renderPayTable(){
  const p=payState;
  const com=commissionBreakdown(p.worker, p.win, p.through);
  let sal=0; for(const m of p.salSel) sal+=salaryFor(p.worker,m);
  const deduct=round2(p.deduct)||0;
  const net=com.amount+sal-deduct;
  p._com=com.amount; p._sal=sal; p._deduct=deduct; p._net=net;
  p._rows=com.rows; p._peers=com.peers;
  const t=document.getElementById('payTable'); if(!t) return;
  /* line-by-line commission — check each kg × rate against your entries before paying */
  let rows='';
  for(const r of com.rows){
    rows+=`<tr><td style="color:var(--muted)">${esc(r.cat)}${r.grade?' '+r.grade:''} · ${r.kg.toLocaleString('en-MY')} kg × ${r.rate.toFixed(2)}</td><td>${fmt(r.rm)}</td></tr>`;
  }
  if(com.peers>1) rows+=`<tr><td style="color:var(--muted)">Split between ${com.peers} workers</td><td>÷ ${com.peers}</td></tr>`;
  t.innerHTML=rows+`
    <tr><td><b>Commission</b> (${com.n} sale${com.n!==1?'s':''})</td><td>${fmt(com.amount)}</td></tr>
    <tr><td>Salary (${p.salSel.size} month${p.salSel.size!==1?'s':''})</td><td>${fmt(sal)}</td></tr>
    ${deduct?`<tr><td>Less advances</td><td>− ${fmt(deduct)}</td></tr>`:''}
    <tr class="grand"><td>Net pay</td><td>${fmt(net)}</td></tr>`;
  const note=document.getElementById('payNote');
  if(note) note.textContent = net<0 ? 'Net is negative — the deduction exceeds what is owed this cycle.' : 'This closes the commission window; the next cycle starts the day after.';
}
function commitPayout(){
  const p=payState;
  const date=document.getElementById('payDate').value||todayStr();
  const salMonths=[...p.salSel].sort();
  if(p._com<=0 && p._sal<=0 && !p._deduct){ toast('Nothing to pay in this cycle'); return; }
  const rec={ id:uid(), date, farm:farmOfWorker(p.worker), type:'Payout', category:'Payout', customer:'', grade:'', qty:null, price:null,
    amount:round2(p._net), worker:p.worker, notes:'', updatedAt:nowMs(), deleted:false,
    comFrom:p.win||live().reduce((a,e)=>e.date<a?e.date:a, todayStr()), comThrough:p.through, salMonths,
    sal:round2(p._sal), com:round2(p._com), deduct:round2(p._deduct),
    comLines:p._rows||[], comPeers:p._peers||1 };
  S.entries.push(rec);
  /* record the deduction as a settlement so advance balance updates */
  if(p._deduct>0){
    S.entries.push({ id:uid(), date, farm:rec.farm, type:'Settlement', category:'Settlement', customer:'', grade:'', qty:null, price:null,
      amount:round2(p._deduct), worker:p.worker, notes:'Deducted at pay day', updatedAt:nowMs(), deleted:false });
  }
  closeSheet(); save(); toast('Payment recorded · '+fmt(rec.amount)); renderWorkers();
}

/* ---- BACKUP ---- */
function exportJSON(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  dl(blob, 'field-ledger-'+todayStr()+'.json');
  S.settings.lastBackup=todayStr(); local.save(S); renderSettings();
}
function exportCSV(){
  const head=['date','farm','type','category','grade','customer','worker','qty','price','amount','notes'];
  const rows=[head.join(',')];
  for(const e of live().slice().sort((a,b)=>a.date.localeCompare(b.date))){
    rows.push(head.map(h=>{ let v=e[h]; if(v==null) v=''; v=String(v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }).join(','));
  }
  dl(new Blob([rows.join('\n')],{type:'text/csv'}), 'field-ledger-entries-'+todayStr()+'.csv');
}
function dl(blob, name){ const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(u),1000); }
function restoreJSON(input){
  const file=input.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const d=JSON.parse(r.result);
      if(!d.entries||!d.settings) throw new Error('bad');
      if(!confirm('Restore this backup? It replaces all data on this device.')) return;
      const keepSync=S.settings.sync;
      S=migrate(d); S.settings.sync=keepSync;
      local.save(S); toast('Backup restored'); switchTab('home'); Sync.schedule();
    }catch(e){ toast('That file could not be read as a backup'); }
  };
  r.readAsText(file); input.value='';
}
